<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>infini</title>
<style>
     * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      padding-bottom: 96px;
      }

    /* top bar */
    .top-bar {
      width: 100%;
      max-width: 1280px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 44px 48px 0;
      position: relative;
      }

    .brand {
      color: rgba(255,255,255,.88);
      font-size: 22px;
      font-weight: 500;
      letter-spacing: .2px;
      line-height: 1;
      }

    .top-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      }

    .play-btn,
    .reset-btn {
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      background: rgba(0,0,0,.36);
      color: #fff;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .3px;
      line-height: 1;
      padding: 15px 28px;
      text-transform: lowercase;
      z-index: 500;
      transition: background .25s ease, border-color .25s ease, opacity .25s ease;
      }

    .reset-btn {
      opacity: .48;
      padding: 15px 22px;
      }

    .reset-btn:hover {
      opacity: 1;
      }

    .play-btn:hover,
    .play-btn.is-playing {
      background: rgba(255,255,255,.95);
      border-color: rgba(255,255,255,.95);
      color: #000;
      }

    /* ── image area ── */
    .image-wrap {
      width: 100%;
      max-width: 1280px;
      aspect-ratio: 16 / 9;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,.02);
      transition: opacity .7s ease;
      }

    .image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transform: translateX(0) scale(1);
      transition: opacity 1.1s ease, transform 1.1s cubic-bezier(.2,.7,.2,1);
      }

    .image-wrap img.enter-right {
      transform: translateX(34px) scale(1.015);
      }

    .image-wrap img.loaded {
      opacity: 1;
      transform: translateX(0) scale(1);
      }

    .image-wrap .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,.1);
      font-size: 14px;
      letter-spacing: 1px;
      }

    .spinner {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.75);
      z-index: 10;
      }
    .spinner.show { display: flex; }

    .spinner-ring {
      width: 40px; height: 40px;
      border: 2px solid rgba(255,255,255,.12);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── carousel ── */
    .carousel-track {
      position: fixed;
      left: 50%;
      bottom: clamp(32px, 7vh, 88px);
      width: min(76vw, 820px);
      height: 172px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      transform: translateX(-50%);
      z-index: 100;
      pointer-events: none;
      }

    .carousel-inner {
      position: relative;
      width: 100%;
      min-width: 0;
      height: 172px;
      overflow: visible;
      pointer-events: auto;
      }

    .carousel-viewport {
      position: absolute;
      left: 50%;
      bottom: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 6px;
      transform: translateX(-50%);
      transition: transform .42s cubic-bezier(.25,.1,.25,1);
      will-change: transform;
      }

    .thumb {
      flex-shrink: 0;
      width: 34px;
      height: 34px;
      border-radius: 7px;
      overflow: hidden;
      cursor: pointer;
      opacity: .72;
      position: relative;
      transform-origin: center bottom;
      box-shadow: 0 10px 26px rgba(0,0,0,.42);
      transition:
        width .42s cubic-bezier(.25,.1,.25,1),
        height .42s cubic-bezier(.25,.1,.25,1),
        opacity .28s ease,
        filter .28s ease,
        transform .42s cubic-bezier(.25,.1,.25,1);
      }

    .thumb:hover {
      opacity: 1;
      transform: translateY(-4px);
      }

    .thumb.spacer {
      cursor: default;
      opacity: 0;
      pointer-events: none;
      box-shadow: none;
      }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      }

    .thumb.edge {
      width: 28px;
      height: 28px;
      opacity: .48;
      filter: saturate(.75) brightness(.85);
      }

    .thumb.far {
      width: 46px;
      height: 46px;
      opacity: .62;
      filter: saturate(.82) brightness(.9);
      }

    .thumb.mid {
      width: 72px;
      height: 72px;
      opacity: .78;
      }

    .thumb.near {
      width: 96px;
      height: 96px;
      opacity: .9;
      }

    .thumb.selected {
      width: 142px;
      height: 142px;
      opacity: 1;
      transform: translateY(-6px);
      box-shadow: 0 18px 46px rgba(0,0,0,.62);
      }
    .thumb.selected::after {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: 7px;
      border: 2px solid rgba(255,255,255,.55);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.35);
      pointer-events: none;
      }

    .thumb.pop-in {
      animation: popFromRight .58s cubic-bezier(.18,.82,.24,1.08);
      }

    .thumb.selected.pop-in {
      animation-name: popSelectedFromRight;
      }

    @keyframes popFromRight {
      0% {
        opacity: 0;
        transform: translateX(74px) scale(.72);
      }
      72% {
        opacity: 1;
        transform: translateX(-8px) scale(1.06);
      }
      100% {
        transform: translateX(0) scale(1);
      }
    }

    @keyframes popSelectedFromRight {
      0% {
        opacity: 0;
        transform: translateX(96px) translateY(-6px) scale(.72);
      }
      72% {
        opacity: 1;
        transform: translateX(-10px) translateY(-6px) scale(1.04);
      }
      100% {
        transform: translateX(0) translateY(-6px) scale(1);
      }
    }

    /* ── responsive ── */
    @media (max-width: 900px) {
      .top-bar { padding: 30px 20px 0; }
      .brand { font-size: 20px; }
      .top-controls { gap: 8px; }
      .play-btn { padding: 13px 24px; }
      .reset-btn { padding: 13px 18px; }
      .carousel-track {
        bottom: 28px;
        width: 88vw;
        height: 132px;
      }
      .carousel-inner { height: 132px; }
      .thumb.edge { width: 18px; height: 18px; }
      .thumb.far { width: 28px; height: 28px; }
      .thumb.mid { width: 48px; height: 48px; }
      .thumb.near { width: 66px; height: 66px; }
      .thumb.selected { width: 104px; height: 104px; }
    }

    @media (max-width: 700px) {
      body {
        min-height: 100svh;
        overflow: hidden;
        padding-bottom: 0;
      }

      .top-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        max-width: none;
        padding: calc(env(safe-area-inset-top) + 18px) 18px 0;
        z-index: 600;
      }

      .brand {
        text-shadow: 0 2px 16px rgba(0,0,0,.48);
      }

      .play-btn {
        background: rgba(0,0,0,.42);
        box-shadow: 0 12px 34px rgba(0,0,0,.28);
      }

      .reset-btn {
        background: rgba(0,0,0,.28);
        box-shadow: 0 12px 34px rgba(0,0,0,.2);
      }

      .image-wrap {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100svh;
        height: 100dvh;
        max-width: none;
        aspect-ratio: auto;
        border-radius: 0;
        z-index: 0;
      }

      .image-wrap img {
        object-fit: cover;
      }

      .carousel-track {
        bottom: calc(env(safe-area-inset-bottom) + 22px);
        width: 100vw;
        height: 124px;
        z-index: 400;
      }

      .carousel-inner {
        height: 124px;
      }
    }
</style>
</head>
<body>

<!-- top bar -->
<div class="top-bar">
     <div class="brand">infini</div>
     <div class="top-controls">
       <button class="reset-btn" id="resetBtn" type="button">reset</button>
       <button class="play-btn" id="playBtn" type="button">play</button>
     </div>
</div>

<!-- ── image area ── -->
<div class="image-wrap" id="imageWrap">
     <img id="mainImg" src="" alt="" />
     <div class="placeholder" id="placeholder"></div>
     <div class="spinner" id="spinner"><div class="spinner-ring"></div></div>
</div>

<!-- ── carousel ── -->
<div class="carousel-track" id="carouselTrack" style="display:none">
     <div class="carousel-inner" id="carouselInner">
       <div class="carousel-viewport" id="carouselViewport"></div>
     </div>
</div>

<script>
/* ═══════════════════════════════════════
   State & Config
   ═══════════════════════════════════════ */
const PROMPT = 'Quantum art';
const API_STORAGE_KEY = 'infini_api_base';
let COMFY_HOST = getComfyHost();
let generations = [];          // { title, imgSrc, createdAt }
let isGenerating = false;
let isPlaying = false;
let currentGenerationIndex = -1;
let generationRun = 0;
let activePromptId = null;
let latestPopIndex = -1;

/* ── persist to localStorage ── */
function save() {
  try { localStorage.setItem('infinite_gen', JSON.stringify(generations)); } catch {}
}
function load() {
  try { generations = JSON.parse(localStorage.getItem('infinite_gen') || '[]'); } catch { generations = []; }
  generations = generations.map((gen) => ({
    title: gen.title || PROMPT,
    imgSrc: normalizeImageSrc(gen.imgSrc),
    createdAt: gen.createdAt || Date.now()
  }));
}

function isPrivateHost(hostname) {
  return hostname === 'localhost' ||
    hostname === '127.0.0.1' ||
    hostname.startsWith('192.168.') ||
    hostname.startsWith('10.') ||
    /^172\.(1[6-9]|2\d|3[0-1])\./.test(hostname);
}

function cleanApiBase(value) {
  return (value || '').trim().replace(/\/+$/, '');
}

function getComfyHost() {
  const params = new URLSearchParams(location.search);
  const queryApi = cleanApiBase(params.get('api'));

  if (queryApi) {
    try { localStorage.setItem(API_STORAGE_KEY, queryApi); } catch {}
    return queryApi;
  }

  try {
    const storedApi = cleanApiBase(localStorage.getItem(API_STORAGE_KEY));
    if (storedApi) return storedApi;
  } catch {}

  if (location.protocol === 'file:') return 'http://localhost:8188';
  if (isPrivateHost(location.hostname)) return location.origin;

  return '';
}

function ensureComfyHost() {
  if (COMFY_HOST) return true;

  const value = cleanApiBase(window.prompt('ComfyUI API URL'));
  if (!value) return false;

  COMFY_HOST = value;
  try { localStorage.setItem(API_STORAGE_KEY, COMFY_HOST); } catch {}
  return true;
}

function normalizeImageSrc(src) {
  if (!src) return '';

  try {
    const url = new URL(src, location.href);
    const isComfyUrl = url.port === '8188' || url.hostname === 'localhost' || url.hostname === '127.0.0.1';

    if (COMFY_HOST && isComfyUrl && COMFY_HOST !== 'http://localhost:8188') {
      return `${COMFY_HOST}${url.pathname}${url.search}`;
    }
  } catch {}

  return src;
}

function findGeneratedImage(historyItem) {
  if (historyItem?.output?.images?.length) {
    return historyItem.output.images[0];
  }

  const outputs = historyItem?.outputs || {};
  for (const output of Object.values(outputs)) {
    if (output?.images?.length) {
      return output.images[0];
    }
  }

  return null;
}

/* ═══════════════════════════════════════
   ComfyUI Communication
   ═══════════════════════════════════════ */

async function interruptGeneration() {
  try {
    await fetch(`${COMFY_HOST}/interrupt`, { method: 'POST' });
  } catch {}
}

async function generate(runId) {
  const workflow = {
      "57:28": {             // UNETLoader
        "class_type": "UNETLoader",
        "inputs": {
          "unet_name": "z_image_turbo_bf16.safetensors",
          "weight_dtype": "default"
        }
      },
      "57:11": {             // ModelSamplingAuraFlow
        "class_type": "ModelSamplingAuraFlow",
        "inputs": {
          "shift": 3,
          "model": ["57:28", 0]
        }
      },
      "57:29": {             // VAELoader
        "class_type": "VAELoader",
        "inputs": {
          "vae_name": "ae.safetensors"
        }
      },
      "57:30": {             // CLIPLoader
        "class_type": "CLIPLoader",
        "inputs": {
          "clip_name": "qwen_3_4b.safetensors",
          "type": "lumina2",
          "device": "default"
        }
      },
      "57:13": {             // EmptySD3LatentImage
        "class_type": "EmptySD3LatentImage",
        "inputs": {
          "width": 1200,
          "height": 720,
          "batch_size": 1
        }
      },
      "58": {                // PrimitiveStringMultiline (prompt)
        "class_type": "PrimitiveStringMultiline",
        "inputs": {
          "value": PROMPT
        }
      },
      "57:27": {             // CLIPTextEncode (prompt)
        "class_type": "CLIPTextEncode",
        "inputs": {
          "text": ["58", 0],
          "clip": ["57:30", 0]
        }
      },
      "57:33": {             // ConditioningZeroOut (no negative)
        "class_type": "ConditioningZeroOut",
        "inputs": {
          "conditioning": ["57:27", 0]
        }
      },
      "57:3": {              // KSampler
        "class_type": "KSampler",
        "inputs": {
          "seed": Math.floor(Math.random() * 999999999),
          "steps": 4,
          "cfg": 1,
          "sampler_name": "res_multistep",
          "scheduler": "simple",
          "denoise": 1,
          "model": ["57:11", 0],
          "positive": ["57:27", 0],
          "negative": ["57:33", 0],
          "latent_image": ["57:13", 0]
        }
      },
      "57:8": {              // VAEDecode
        "class_type": "VAEDecode",
        "inputs": {
          "samples": ["57:3", 0],
          "vae": ["57:29", 0]
        }
      },
      "9": {                 // SaveImage
        "class_type": "SaveImage",
        "inputs": {
          "filename_prefix": "Infinite_",
          "images": ["57:8", 0]
        }
      }
    };

  try {
    const res = await fetch(`${COMFY_HOST}/prompt`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Infini-Client': '2'
      },
      body: JSON.stringify({ prompt: workflow })
        });

    if (!res.ok) throw new Error('Prompt failed');

    const data = await res.json();
    const promptId = data.prompt_id || data.client_id;
    activePromptId = promptId;

         /* poll /history until done */
    let attempts = 0;
    while (attempts < 120) {
      if (runId !== generationRun || !isPlaying) return;
      await new Promise(r => setTimeout(r, 1500));
      if (runId !== generationRun || !isPlaying) return;

      const hRes = await fetch(`${COMFY_HOST}/history/${promptId}`);
      const hData = await hRes.json();

      const imgInfo = findGeneratedImage(hData[promptId]);

      if (imgInfo) {
        if (runId !== generationRun || !isPlaying) return;
          /* build image URL */
        const { filename, subfolder, type } = imgInfo;
        const params = new URLSearchParams({
          filename,
          type: type || 'output'
            });
        if (subfolder) params.set('subfolder', subfolder);
        const url = `${COMFY_HOST}/view?${params}`;
        onImageReady(url);
        return;
         }
      attempts++;
       }
    throw new Error('Generation timed out');

       } catch (err) {
    if (runId !== generationRun) return;
    console.error('[comfy]', err);
    isGenerating = false;
    isPlaying = false;
    updatePlayState();
    $spinner.classList.remove('show');
       } finally {
    if (runId === generationRun) {
      activePromptId = null;
    }
       }
}

/* ═══════════════════════════════════════
   UI Flow
   ═══════════════════════════════════════ */

const $mainImg      = document.getElementById('mainImg');
const $placeholder  = document.getElementById('placeholder');
const $spinner      = document.getElementById('spinner');
const $playBtn      = document.getElementById('playBtn');
const $resetBtn     = document.getElementById('resetBtn');
const $carouselTrack = document.getElementById('carouselTrack');
const $carouselInner = document.getElementById('carouselInner');
const $viewport     = document.getElementById('carouselViewport');

function loadMainImage(src, fromRight = false) {
  const nextSrc = normalizeImageSrc(src);
  if (!nextSrc) return;

  $mainImg.classList.remove('loaded');
  $mainImg.classList.toggle('enter-right', fromRight);
  $mainImg.onload = () => {
    requestAnimationFrame(() => {
      requestAnimationFrame(() => $mainImg.classList.add('loaded'));
    });
  };
  $mainImg.src = nextSrc;

  if ($mainImg.complete) {
    requestAnimationFrame(() => {
      requestAnimationFrame(() => $mainImg.classList.add('loaded'));
    });
  }
}

/* When image arrives from ComfyUI */
function onImageReady(url) {
  const imgSrc = normalizeImageSrc(url);
  generations.push({ title: PROMPT, imgSrc, createdAt: Date.now() });
  latestPopIndex = generations.length - 1;
  save();
  isGenerating = false;

  selectGeneration(generations.length - 1, false, true);

  renderCarousel();
  updatePlayState();

  if (isPlaying) {
    setTimeout(startNextGeneration, 600);
  }
}

function updatePlayState() {
  $playBtn.classList.toggle('is-playing', isPlaying);
  $playBtn.setAttribute('aria-pressed', String(isPlaying));
  $playBtn.textContent = isPlaying || isGenerating ? 'stop' : 'play';
  $playBtn.setAttribute('aria-label', isPlaying || isGenerating ? 'Stop generation' : 'Start generation');
  $spinner.classList.toggle('show', isGenerating && generations.length === 0);
}

function startNextGeneration() {
  if (!isPlaying || isGenerating) return;

  isGenerating = true;
  updatePlayState();
  generate(generationRun);
}

function stopGeneration() {
  generationRun++;
  isPlaying = false;
  isGenerating = false;
  activePromptId = null;
  updatePlayState();
  interruptGeneration();
}

function resetLibrary() {
  generationRun++;
  isPlaying = false;
  isGenerating = false;
  activePromptId = null;
  latestPopIndex = -1;
  currentGenerationIndex = -1;
  generations = [];

  try { localStorage.removeItem('infinite_gen'); } catch {}

  $mainImg.onload = null;
  $mainImg.classList.remove('loaded', 'enter-right');
  $mainImg.removeAttribute('src');
  $placeholder.textContent = '';
  renderCarousel();
  updatePlayState();
  interruptGeneration();
}

$playBtn.addEventListener('click', () => {
  if (isPlaying || isGenerating) {
    stopGeneration();
    return;
  }

  if (!ensureComfyHost()) return;

  generationRun++;
  isPlaying = true;
  updatePlayState();
  startNextGeneration();
});

$resetBtn.addEventListener('click', resetLibrary);

/* ═══════════════════════════════════════
   Carousel
   ═══════════════════════════════════════ */

const CAROUSEL_RADIUS = 6;

function thumbClassForDistance(distance) {
  if (distance === 0) return 'selected';
  if (distance === 1) return 'near';
  if (distance === 2) return 'mid';
  if (distance <= 4) return 'far';
  return 'edge';
}

function selectGeneration(index, shouldRender = true, fromRight = false) {
  if (index < 0 || index >= generations.length) return;

  currentGenerationIndex = index;
  const gen = generations[index];
  loadMainImage(gen.imgSrc, fromRight);
  $placeholder.textContent = '';
  updatePlayState();

  if (shouldRender) renderCarousel();
}

function renderCarousel() {
     $viewport.innerHTML = '';
     $viewport.style.transform = 'translateX(-50%)';

  if (generations.length === 0) {
    $carouselTrack.style.display = 'none';
    return;
  }

  if (currentGenerationIndex < 0 || currentGenerationIndex >= generations.length) {
    currentGenerationIndex = generations.length - 1;
  }

  $carouselTrack.style.display = 'flex';

  for (let offset = -CAROUSEL_RADIUS; offset <= CAROUSEL_RADIUS; offset++) {
    const i = currentGenerationIndex + offset;
    const distance = Math.abs(offset);

    if (i < 0 || i >= generations.length) {
      const spacer = document.createElement('div');
      spacer.className = `thumb ${thumbClassForDistance(distance)} spacer`;
      $viewport.appendChild(spacer);
      continue;
    }

    const gen = generations[i];
    const div = document.createElement('div');
    div.className = `thumb ${thumbClassForDistance(distance)}${i === latestPopIndex ? ' pop-in' : ''}`;
    div.setAttribute('aria-label', gen.title || `Generation ${i + 1}`);
    div.setAttribute('role', 'button');
    div.tabIndex = 0;
    div.addEventListener('animationend', () => {
      div.classList.remove('pop-in');
      if (i === latestPopIndex) latestPopIndex = -1;
    }, { once: true });

    const img = document.createElement('img');
    img.src = normalizeImageSrc(gen.imgSrc);
    img.alt = gen.title;
    img.draggable = false;
    div.appendChild(img);

       /* Click thumbnail: show it as main image */
    div.addEventListener('click', () => {
       selectGeneration(i);
      });
    div.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        selectGeneration(i);
      }
    });

     $viewport.appendChild(div);
     }
}

/* ═══════════════════════════════════════
   Init
   ═══════════════════════════════════════ */
load();

if (generations.length > 0) {
     /* Show last generation */
    selectGeneration(generations.length - 1, false);
    renderCarousel();
} else {
  $placeholder.textContent = '';
}

updatePlayState();


</script>
</body>
</html>
