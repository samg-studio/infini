<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="infini">
<link rel="manifest" href="manifest.webmanifest">
<title>infini</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @property --iris {
      syntax: '<percentage>';
      inherits: false;
      initial-value: 150%;
    }

    body {
      --art-aspect: 16 / 9;
      --art-ratio: 1.777777778;
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      padding-bottom: 96px;
      }

    body.art-portrait {
      --art-aspect: 9 / 16;
      --art-ratio: .5625;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at top right,
          rgba(0,0,0,.76) 0%,
          rgba(0,0,0,.46) 18%,
          rgba(0,0,0,0) 48%),
        radial-gradient(ellipse at top left,
          rgba(0,0,0,.52) 0%,
          rgba(0,0,0,.26) 22%,
          rgba(0,0,0,0) 52%),
        radial-gradient(ellipse at bottom left,
          rgba(0,0,0,.68) 0%,
          rgba(0,0,0,.36) 24%,
          rgba(0,0,0,0) 56%),
        radial-gradient(ellipse at bottom right,
          rgba(0,0,0,.68) 0%,
          rgba(0,0,0,.36) 24%,
          rgba(0,0,0,0) 56%),
        linear-gradient(to bottom,
          rgba(0,0,0,.32) 0%,
          rgba(0,0,0,0) 28%,
          rgba(0,0,0,0) 68%,
          rgba(0,0,0,.42) 100%);
      pointer-events: none;
      z-index: 520;
      }

    body.fill-mode::before {
      background:
        radial-gradient(ellipse at top right,
          rgba(0,0,0,.5) 0%,
          rgba(0,0,0,.25) 18%,
          rgba(0,0,0,0) 48%),
        radial-gradient(ellipse at top left,
          rgba(0,0,0,.34) 0%,
          rgba(0,0,0,.16) 22%,
          rgba(0,0,0,0) 52%),
        radial-gradient(ellipse at bottom left,
          rgba(0,0,0,.46) 0%,
          rgba(0,0,0,.22) 24%,
          rgba(0,0,0,0) 56%),
        radial-gradient(ellipse at bottom right,
          rgba(0,0,0,.46) 0%,
          rgba(0,0,0,.22) 24%,
          rgba(0,0,0,0) 56%),
        linear-gradient(to bottom,
          rgba(0,0,0,.22) 0%,
          rgba(0,0,0,0) 30%,
          rgba(0,0,0,0) 70%,
          rgba(0,0,0,.28) 100%);
      }

    .splash {
      position: fixed;
      inset: 0;
      appearance: none;
      border: 0;
      display: grid;
      place-items: center;
      background: #000;
      cursor: pointer;
      z-index: 2000;
      animation: splashFade 3.2s ease forwards;
    }

    .splash.is-hidden {
      display: none;
    }

    .splash-mark {
      color: #fff;
      font-size: clamp(84px, 16vw, 220px);
      font-weight: 800;
      line-height: 1;
      opacity: 0;
      animation: splashMark 2.9s ease forwards;
    }

    .splash:focus-visible {
      outline: 1px solid rgba(255,255,255,.62);
      outline-offset: -28px;
    }

    @keyframes splashFade {
      0%, 68% { opacity: 1; visibility: visible; }
      100% { opacity: 0; visibility: hidden; }
    }

    @keyframes splashMark {
      0% { opacity: 0; transform: scale(.96); }
      24%, 72% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.025); }
    }

    /* top bar */
    .top-bar {
      width: 100%;
      max-width: 1280px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 44px 48px 0;
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 600;
      }

    .title-stack {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: min(28vw, 280px);
      }

    .brand {
      color: rgba(255,255,255,.88);
      font-size: 34px;
      font-weight: 500;
      letter-spacing: .2px;
      line-height: 1;
      }

    .top-controls {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 9px;
      }

    .play-btn {
      align-self: flex-start;
      margin-top: 2px;
    }

    .reset-btn {
      margin-top: 9px;
      }

    .prompt-dock {
      position: relative;
      width: 100%;
      border: 1px solid transparent;
      border-radius: 0;
      transform: none;
      transition: opacity .35s ease;
      }

    .prompt-input {
      width: 100%;
      appearance: none;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-sizing: border-box;
      color: rgba(255,255,255,.92);
      font: inherit;
      font-size: 18px;
      font-weight: 400;
      line-height: 1.35;
      min-height: 64px;
      max-height: 168px;
      outline: none;
      overflow-y: auto;
      padding: 0 22px 0 0;
      resize: none;
      scrollbar-width: none;
      text-align: left;
      transition: color .25s ease, text-shadow .25s ease;
      white-space: pre-wrap;
    }

    body.is-prompt-focused .prompt-input,
    .prompt-dock.has-value .prompt-input {
      text-shadow: none;
    }

    .prompt-input::-webkit-scrollbar {
      display: none;
    }

    .prompt-input::placeholder {
      color: rgba(255,255,255,.3);
      transition: color .55s ease;
    }

    .prompt-input.is-demo-fading::placeholder {
      color: rgba(255,255,255,0);
    }

    .prompt-input:focus {
      color: #fff;
    }

    .prompt-input:read-only {
      cursor: default;
      opacity: .62;
    }

    .prompt-clear {
      position: absolute;
      top: 1px;
      right: 0;
      width: 22px;
      height: 24px;
      appearance: none;
      background: none;
      border: 0;
      color: rgba(255,255,255,.78);
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      font-weight: 500;
      line-height: 1;
      opacity: 0;
      padding: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }

    .prompt-dock.has-value .prompt-clear {
      opacity: .6;
      pointer-events: auto;
    }

    .prompt-dock.has-value .prompt-clear:hover {
      opacity: 1;
    }

    .active-prompt {
      position: fixed;
      right: 28px;
      bottom: calc(env(safe-area-inset-bottom) + 12px);
      max-width: min(58vw, 760px);
      color: rgba(255,255,255,.72);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .2px;
      line-height: 1.35;
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
      text-align: right;
      text-overflow: ellipsis;
      text-shadow: 0 2px 18px rgba(0,0,0,.68);
      transition: opacity .45s ease;
      white-space: nowrap;
      z-index: 700;
    }

    .studio-link {
      position: fixed;
      left: 28px;
      bottom: calc(env(safe-area-inset-bottom) + 12px);
      color: rgba(255,255,255,.72);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .2px;
      line-height: 1.35;
      text-decoration: none;
      text-shadow: 0 2px 18px rgba(0,0,0,.68);
      transition: opacity .25s ease;
      z-index: 700;
    }

    .studio-link:hover {
      opacity: 1;
    }

    body.is-running .prompt-dock {
      opacity: 0;
      pointer-events: none;
    }

    body.is-running .active-prompt,
    body.has-active-prompt .active-prompt {
      opacity: 1;
    }

    .play-btn,
    .reset-btn,
    .gallery-btn,
    .grid-btn,
    .download-btn,
    .delete-btn,
    .fill-btn {
      appearance: none;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: .2px;
      line-height: 1;
      opacity: .52;
      padding: 0;
      text-transform: lowercase;
      z-index: 500;
      transition: opacity .25s ease;
      }

    .play-btn:hover,
    .play-btn.is-playing,
    .reset-btn:hover,
    .gallery-btn:hover,
    .gallery-btn.is-active,
    .grid-btn:hover,
    .grid-btn.is-active,
    .download-btn:hover,
    .download-btn.is-active,
    .delete-btn:hover,
    .delete-btn.is-active {
      opacity: 1;
      }

    .fill-btn {
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      opacity: .82;
    }

    .fill-icon {
      position: relative;
      display: block;
      width: 20px;
      height: 20px;
    }

    .fill-icon::before {
      content: '';
      position: absolute;
      top: 3px;
      right: 3px;
      width: 15px;
      height: 2px;
      background: currentColor;
      border-radius: 999px;
      transform: rotate(-45deg);
      transform-origin: right center;
    }

    .fill-icon::after {
      content: '';
      position: absolute;
      top: 4px;
      right: 3px;
      width: 8px;
      height: 8px;
      border-top: 2px solid currentColor;
      border-right: 2px solid currentColor;
    }

    .fill-btn.is-active,
    .fill-btn:hover {
      opacity: 1;
      }

    .delete-panel {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      padding: calc(env(safe-area-inset-top) + 96px) clamp(18px, 4vw, 58px) calc(env(safe-area-inset-bottom) + 48px);
      background:
        radial-gradient(ellipse at top left, rgba(0,0,0,.92), rgba(0,0,0,.68) 42%, rgba(0,0,0,.52)),
        rgba(0,0,0,.52);
      backdrop-filter: blur(18px);
      z-index: 920;
    }

    body.delete-mode .delete-panel {
      display: flex;
    }

    .delete-grid {
      width: min(1040px, 100%);
      max-height: min(68vh, 680px);
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(86px, 1fr));
      gap: 10px;
      overflow: auto;
      overscroll-behavior: contain;
      padding: 2px;
    }

    .delete-thumb {
      position: relative;
      appearance: none;
      width: 100%;
      aspect-ratio: 1;
      border: 0;
      border-radius: 7px;
      overflow: hidden;
      background: rgba(255,255,255,.05);
      cursor: pointer;
      opacity: .74;
      padding: 0;
      transform: translateZ(0);
      transition: opacity .18s ease, transform .18s ease, filter .18s ease;
    }

    .delete-thumb:hover,
    .delete-thumb.is-selected {
      opacity: 1;
      filter: saturate(1.05);
    }

    .delete-thumb.is-selected {
      transform: scale(.96);
    }

    .delete-thumb img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .delete-thumb.is-selected::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 2px solid rgba(255,255,255,.86);
      border-radius: 7px;
      box-shadow: inset 0 0 0 2px rgba(0,0,0,.42);
      pointer-events: none;
    }

    .delete-actions {
      width: min(1040px, 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    .delete-action {
      appearance: none;
      background: none;
      border: 0;
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: .2px;
      line-height: 1;
      opacity: .56;
      padding: 0;
      text-transform: lowercase;
      transition: opacity .2s ease;
    }

    .delete-action:hover,
    .delete-action:not(:disabled) {
      opacity: 1;
    }

    .delete-action:disabled {
      cursor: default;
      opacity: .24;
    }

    .delete-empty {
      grid-column: 1 / -1;
      color: rgba(255,255,255,.45);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.4;
      padding: 28px 0;
      text-align: center;
    }

    /* ── image area ── */
    .image-wrap {
      width: min(calc(100vw - clamp(470px, 36vw, 560px)), 1080px);
      max-width: calc(100vw - 96px);
      aspect-ratio: var(--art-aspect);
      margin-top: clamp(46px, 6vh, 90px);
      margin-right: clamp(24px, 4vw, 64px);
      margin-left: auto;
      align-self: flex-end;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,.02);
      transition: opacity .7s ease, filter .35s ease;
      }

    body.is-prompt-focused:not(.fill-mode) .image-wrap {
      filter: blur(10px) brightness(.58);
    }

    .main-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transform: translateZ(0);
      z-index: 1;
      }

    .main-img.is-visible {
      opacity: 1;
      transform: translateZ(0);
      }

    .main-img.is-entering {
      opacity: 0;
      z-index: 3;
      animation: fadeNextIn 3.2s ease forwards;
      }

    .main-img.is-exiting {
      opacity: 1;
      z-index: 2;
      animation: softRelease 3.2s ease forwards;
      }

    .image-wrap.is-slow-transition .main-img.is-entering {
      animation: fadeNextInSlow 4.6s ease forwards;
    }

    .image-wrap.is-slow-transition .main-img.is-exiting {
      animation: softReleaseSlow 4.6s ease forwards;
    }

    .image-wrap.is-transitioning::after {
      content: '';
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 4;
      animation: fadeToBlack 3.2s ease-in-out forwards;
      }

    .image-wrap.is-slow-transition.is-transitioning::after {
      animation: fadeToBlackSlow 4.6s ease-in-out forwards;
    }

    @keyframes fadeNextIn {
      0%, 34% {
        opacity: 0;
        filter: blur(1.5px);
      }
      76% {
        opacity: 1;
      }
      100% {
        opacity: 1;
        filter: blur(0);
      }
    }

    @keyframes softRelease {
      0% {
        filter: blur(0);
        opacity: 1;
      }
      42% {
        opacity: 0;
      }
      100% {
        filter: blur(2px);
        opacity: 0;
      }
    }

    @keyframes fadeToBlack {
      0%, 8% {
        opacity: 0;
      }
      24%, 46% {
        opacity: 1;
      }
      100% {
        opacity: 0;
      }
    }

    @keyframes fadeNextInSlow {
      0%, 42% {
        opacity: 0;
        filter: blur(1.5px);
      }
      78% {
        opacity: 1;
      }
      100% {
        opacity: 1;
        filter: blur(0);
      }
    }

    @keyframes softReleaseSlow {
      0% {
        filter: blur(0);
        opacity: 1;
      }
      46% {
        opacity: 0;
      }
      100% {
        filter: blur(2px);
        opacity: 0;
      }
    }

    @keyframes fadeToBlackSlow {
      0%, 10% {
        opacity: 0;
      }
      30%, 54% {
        opacity: 1;
      }
      100% {
        opacity: 0;
      }
    }

    .image-wrap .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,.1);
      font-size: 14px;
      letter-spacing: 1px;
      }

    .spinner {
      position: fixed;
      right: 28px;
      bottom: calc(env(safe-area-inset-bottom) + 25px);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0;
      opacity: 0;
      pointer-events: none;
      z-index: 710;
      transition: opacity .8s ease;
      }
    .spinner.show { opacity: 1; }

    .spinner.is-first {
      left: 50%;
      right: auto;
      top: 50%;
      bottom: auto;
      transform: translate(-50%, -50%);
    }

    .generation-progress {
      display: none;
    }

    .spinner.has-progress .generation-progress {
      display: none;
    }

    .progress-text {
      color: rgba(255,255,255,.68);
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .2px;
      line-height: 1;
      text-align: right;
      text-shadow: 0 2px 16px rgba(0,0,0,.66);
      white-space: nowrap;
    }

    .progress-bar {
      display: block;
      height: 2px;
      margin-top: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.18);
      box-shadow: 0 0 18px rgba(255,255,255,.08);
    }

    .progress-fill {
      display: block;
      width: var(--progress, 0%);
      height: 100%;
      border-radius: inherit;
      background: rgba(255,255,255,.82);
      transition: width .72s cubic-bezier(.22,.75,.25,1);
    }

    .generation-mark {
      color: #fff;
      display: block;
      font-size: clamp(30px, 3.4vw, 52px);
      font-weight: 800;
      line-height: 1;
      text-shadow:
        0 0 18px rgba(255,255,255,.22),
        0 5px 24px rgba(0,0,0,.62);
      animation: generationMarkFade 2.8s ease-in-out infinite;
      }

    .spinner.is-first .generation-mark {
      font-size: clamp(84px, 16vw, 220px);
      text-shadow:
        0 0 26px rgba(255,255,255,.2),
        0 8px 34px rgba(0,0,0,.72);
    }

    .spinner.is-first .generation-progress {
      display: none;
    }

    @keyframes generationMarkFade {
      0%, 100% {
        opacity: .22;
        transform: scale(.98);
      }
      50% {
        opacity: .92;
        transform: scale(1.02);
      }
    }

    /* ── carousel ── */
    .carousel-track {
      position: fixed;
      left: 50%;
      bottom: clamp(32px, 7vh, 88px);
      width: min(76vw, 820px);
      height: 172px;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateX(-50%);
      z-index: 100;
      pointer-events: none;
      }

    .carousel-track.hidden {
      display: none !important;
      }

    .carousel-inner {
      position: relative;
      width: 100%;
      min-width: 0;
      height: 172px;
      overflow: visible;
      pointer-events: auto;
      cursor: grab;
      touch-action: pan-y;
      user-select: none;
      -webkit-user-select: none;
      }

    .carousel-inner.is-dragging {
      cursor: grabbing;
    }

    .carousel-viewport {
      position: absolute;
      left: 50%;
      top: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transform: translate(-50%, -50%);
      transition: transform .42s cubic-bezier(.25,.1,.25,1);
      will-change: transform;
      }

    .thumb {
      flex-shrink: 0;
      width: 34px;
      height: 34px;
      border-radius: 7px;
      overflow: hidden;
      cursor: pointer;
      opacity: .72;
      position: relative;
      transform-origin: center center;
      box-shadow: 0 10px 26px rgba(0,0,0,.42);
      transition:
        width .42s cubic-bezier(.25,.1,.25,1),
        height .42s cubic-bezier(.25,.1,.25,1),
        opacity .28s ease,
        filter .28s ease,
        transform .42s cubic-bezier(.25,.1,.25,1);
      }

    .thumb:hover {
      opacity: 1;
      transform: translateY(-4px);
      }

    .thumb.spacer {
      cursor: default;
      opacity: 0;
      pointer-events: none;
      box-shadow: none;
      }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      }

    .thumb.edge {
      width: 28px;
      height: 28px;
      opacity: .48;
      filter: saturate(.75) brightness(.85);
      }

    .thumb.far {
      width: 46px;
      height: 46px;
      opacity: .62;
      filter: saturate(.82) brightness(.9);
      }

    .thumb.mid {
      width: 72px;
      height: 72px;
      opacity: .78;
      }

    .thumb.near {
      width: 98px;
      height: 98px;
      opacity: .9;
      }

    .thumb.selected {
      width: 122px;
      height: 122px;
      opacity: 1;
      box-shadow: 0 18px 46px rgba(0,0,0,.62);
      }
    .thumb.selected::after {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: 7px;
      border: 2px solid rgba(255,255,255,.55);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.35);
      pointer-events: none;
      }

    .thumb.pop-in {
      animation: popFromRight .58s cubic-bezier(.18,.82,.24,1.08);
      }

    .thumb.selected.pop-in {
      animation-name: popSelectedFromRight;
      }

    @keyframes popFromRight {
      0% {
        opacity: 0;
        transform: translateX(74px) scale(.72);
      }
      72% {
        opacity: 1;
        transform: translateX(-8px) scale(1.06);
      }
      100% {
        transform: translateX(0) scale(1);
      }
    }

    @keyframes popSelectedFromRight {
      0% {
        opacity: 0;
        transform: translateX(96px) scale(.72);
      }
      72% {
        opacity: 1;
        transform: translateX(-10px) scale(1.04);
      }
      100% {
        transform: translateX(0) scale(1);
      }
    }

    /* ── responsive ── */
    @media (max-width: 900px) {
      .top-bar { padding: 30px 20px 0; }
      .brand { font-size: 30px; }
      .title-stack { gap: 12px; }
      .top-controls { gap: 9px; }
      .prompt-dock {
        width: 100%;
      }
      .prompt-input {
        font-size: 17px;
      }
      .image-wrap {
        width: min(calc(100vw - 300px), 880px);
      }
      .carousel-track {

function ensureComfyHost() {
  if (COMFY_HOST) return true;

  const value = cleanApiBase(window.prompt('ComfyUI API URL'));
  if (!value) return false;

  COMFY_HOST = value;
  try { localStorage.setItem(API_STORAGE_KEY, COMFY_HOST); } catch {}
  return true;
}

function getProgressSocketUrl() {
  if (!COMFY_HOST) return '';

  try {
    const url = new URL(COMFY_HOST, location.href);
    url.protocol = url.protocol === 'https:' ? 'wss:' : 'ws:';
    url.pathname = `${url.pathname.replace(/\/+$/, '')}/ws`;
    url.search = new URLSearchParams({ clientId: CLIENT_ID }).toString();
    return url.toString();
  } catch {
    return '';
  }
}

function shouldRequestLocalNetworkAccess(urlValue = COMFY_HOST) {
  try {
    const hostname = new URL(urlValue, location.href).hostname;
    return isTailscaleHost(hostname) || isPrivateHost(hostname) || hostname.endsWith('.local');
  } catch {
    return false;
  }
}

function getFetchOptions(options = {}, urlValue = COMFY_HOST) {
  const fetchOptions = { ...options };
  if (shouldRequestLocalNetworkAccess(urlValue)) {
    fetchOptions.targetAddressSpace = 'local';
  }
  return fetchOptions;
}

async function fetchWithTimeout(urlValue, options = {}, timeoutMs = 15000) {
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

  try {
    return await fetch(urlValue, getFetchOptions({
      ...options,
      signal: controller.signal
    }, urlValue));
  } finally {
    clearTimeout(timeoutId);
  }
}

function apiFetch(path, options = {}, timeoutMs = 15000) {
  return fetchWithTimeout(`${COMFY_HOST}${path}`, options, timeoutMs);
}

function setGenerationProgress(value = 0, max = WORKFLOW_STEPS) {
  const safeMax = Math.max(1, Number(max) || WORKFLOW_STEPS);
  const safeValue = Math.max(0, Math.min(safeMax, Number(value) || 0));
  const displayStep = Math.max(1, Math.min(safeMax, Math.ceil(safeValue)));
  const percent = `${(safeValue / safeMax) * 100}%`;

  generationProgress = { value: safeValue, max: safeMax };
  $progressText.textContent = `step ${displayStep} / ${safeMax}`;
  $progressFill.style.setProperty('--progress', percent);
  $progressFill.style.width = percent;
}

function resetGenerationProgress() {
  setGenerationProgress(0, WORKFLOW_STEPS);
}

function stopProgressFallback() {
  if (!progressFallbackTimer) return;
  clearInterval(progressFallbackTimer);
  progressFallbackTimer = null;
}

function startProgressFallback() {
  stopProgressFallback();
  progressFallbackStartedAt = Date.now();
  lastLiveProgressAt = 0;

  progressFallbackTimer = setInterval(() => {
    if (!isGenerating) {
      stopProgressFallback();
      return;
    }

    if (Date.now() - lastLiveProgressAt < 2500) return;

    setEstimatedGenerationProgress(Date.now() - progressFallbackStartedAt);
  }, 420);
}

function setEstimatedGenerationProgress(elapsed) {
  const estimatedValue = Math.min(
    WORKFLOW_STEPS - .05,
    elapsed / ESTIMATED_STEP_MS
  );
  if (estimatedValue <= generationProgress.value) return;

  const displayStep = Math.max(1, Math.min(
    WORKFLOW_STEPS,
    Math.floor(elapsed / ESTIMATED_STEP_MS) + 1
  ));
  const percent = `${(estimatedValue / WORKFLOW_STEPS) * 100}%`;

  generationProgress = { value: estimatedValue, max: WORKFLOW_STEPS };
  $progressText.textContent = `step ${displayStep} / ${WORKFLOW_STEPS}`;
  $progressFill.style.setProperty('--progress', percent);
  $progressFill.style.width = percent;
}

function handleProgressMessage(event) {
  let message;
  try {
    message = JSON.parse(event.data);
  } catch {
    return;
  }

  const data = message?.data || {};
  if (data.prompt_id && activePromptId && data.prompt_id !== activePromptId) return;

  if (message.type === 'progress' && (!data.node || data.node === KSAMPLER_NODE_ID)) {
    lastLiveProgressAt = Date.now();
    setGenerationProgress(data.value, data.max || WORKFLOW_STEPS);
  }
}

function closeProgressSocket() {
  socketReadyPromise = null;
  if (!comfySocket) return;

  try { comfySocket.close(); } catch {}
  comfySocket = null;
}

function openProgressSocket() {
  if (!window.WebSocket || !COMFY_HOST) return Promise.resolve(false);
  if (comfySocket?.readyState === WebSocket.OPEN) return Promise.resolve(true);
  if (socketReadyPromise) return socketReadyPromise;

  const socketUrl = getProgressSocketUrl();
  if (!socketUrl) return Promise.resolve(false);

  socketReadyPromise = new Promise((resolve) => {
    let didResolve = false;
    const resolveOnce = (value) => {
      if (didResolve) return;
      didResolve = true;
      resolve(value);
    };

    try {
      comfySocket = new WebSocket(socketUrl);
      comfySocket.addEventListener('open', () => resolveOnce(true), { once: true });
      comfySocket.addEventListener('message', handleProgressMessage);
      comfySocket.addEventListener('error', () => resolveOnce(false), { once: true });
      comfySocket.addEventListener('close', () => {
        if (comfySocket?.readyState === WebSocket.CLOSED) comfySocket = null;
        socketReadyPromise = null;
      });
      setTimeout(() => resolveOnce(comfySocket?.readyState === WebSocket.OPEN), 1400);
    } catch {
      comfySocket = null;
      socketReadyPromise = null;
      resolveOnce(false);
    }
  });

  return socketReadyPromise;
}

function normalizeImageSrc(src) {
  if (!src) return '';

  try {
    const url = new URL(src, location.href);
    const isComfyUrl = url.port === '8188' || url.hostname === 'localhost' || url.hostname === '127.0.0.1';

    if (COMFY_HOST && isComfyUrl && COMFY_HOST !== 'http://localhost:8188') {
      return `${COMFY_HOST}${url.pathname}${url.search}`;
    }
  } catch {}

  return src;
}

function normalizeImageInfo(info) {
  if (!info?.filename) return null;

  return {
    filename: String(info.filename),
    subfolder: String(info.subfolder || ''),
    type: String(info.type || 'output') || 'output'
  };
}

function imageKeyFromInfo(info) {
  const imageInfo = normalizeImageInfo(info);
  if (!imageInfo?.filename) return '';
  return `${imageInfo.filename}|${imageInfo.subfolder || ''}|${imageInfo.type || 'output'}`;
}

function imageInfoFromSrc(src) {
  if (!src) return null;

  try {
    const url = new URL(src, location.href);
    const filename = url.searchParams.get('filename');
    if (!filename) return null;

    return normalizeImageInfo({
      filename,
      subfolder: url.searchParams.get('subfolder') || '',
      type: url.searchParams.get('type') || 'output'
    });
  } catch {
    return null;
  }
}

function normalizeGenerationRecord(gen) {
  const imgSrc = normalizeImageSrc(gen.imgSrc);
  const imageInfo = normalizeImageInfo(gen.imageInfo) || imageInfoFromSrc(imgSrc);
  const key = gen.key || imageKeyFromInfo(imageInfo) || imgSrc;

  return {
    title: gen.title || DEFAULT_PROMPT,
    imgSrc,
    imageInfo,
    key,
    createdAt: gen.createdAt || Date.now(),
    width: gen.width || 1200,
    height: gen.height || 675,
    clientId: gen.clientId || CLIENT_ID
  };
}

function findGeneratedImage(historyItem) {
  if (historyItem?.output?.images?.length) {
    return historyItem.output.images[0];
  }

  const outputs = historyItem?.outputs || {};
  for (const output of Object.values(outputs)) {
    if (output?.images?.length) {
      return output.images[0];
    }
  }

  return null;
}

function buildImagePath(imgInfo) {
  const imageInfo = normalizeImageInfo(imgInfo);
  if (!imageInfo?.filename) return '';

  const params = new URLSearchParams({
    filename: imageInfo.filename,
    type: imageInfo.type || 'output'
  });
  if (imageInfo.subfolder) params.set('subfolder', imageInfo.subfolder);
  return `/view?${params}`;
}

function buildImageUrl(imgInfo) {
  const imagePath = buildImagePath(imgInfo);
  return imagePath ? `${COMFY_HOST}${imagePath}` : '';
}

async function generationSourceExists(gen) {
  if (!COMFY_HOST || !gen?.imageInfo?.filename) return true;

  try {
    const res = await apiFetch(buildImagePath(gen.imageInfo), {
      method: 'HEAD',
      cache: 'no-store'
    }, 8000);

    return res.status !== 404 && res.status !== 410;
  } catch {
    return true;
  }
}

async function filterAvailableGenerations(candidates) {
  const available = [];
  const chunkSize = 8;

  for (let i = 0; i < candidates.length; i += chunkSize) {
    const chunk = candidates.slice(i, i + chunkSize);
    const results = await Promise.all(chunk.map(async (gen) => ({
      gen,
      exists: await generationSourceExists(gen)
    })));

    results.forEach(({ gen, exists }) => {
      if (exists) available.push(gen);
    });
  }

  return available;
}

async function pruneMissingGenerations() {
  if (!COMFY_HOST || isPruningMissing || generations.length === 0) return false;

  isPruningMissing = true;
  try {
    const availableGenerations = await filterAvailableGenerations(generations);

    if (availableGenerations.length === generations.length) return false;

    const availableKeys = new Set(availableGenerations.map((gen) => gen.key));
    const missingKeys = new Set(generations
      .map((gen) => gen.key)
      .filter((key) => !availableKeys.has(key)));
    return removeGenerationsByKeys(missingKeys);
  } finally {
    isPruningMissing = false;
  }
}

function getHistoryPrompt(historyItem) {
  return historyItem?.prompt?.[2]?.['58']?.inputs?.value || DEFAULT_PROMPT;
}

function getHistoryDimensions(historyItem) {
  const latentInputs = historyItem?.prompt?.[2]?.['57:13']?.inputs || {};
  return {
    width: Number(latentInputs.width) || 1200,
    height: Number(latentInputs.height) || 675
  };
}

function getHistoryTimestamp(historyItem, fallback) {
  const messages = Array.isArray(historyItem?.status?.messages)
    ? historyItem.status.messages
    : [];
  const match = [...messages].reverse().find(([type]) =>
    type === 'execution_success' || type === 'execution_start'
  );
  return Number(match?.[1]?.timestamp) || fallback;
}

function getHistoryClientId(historyItem) {
  return historyItem?.prompt?.[3]?.client_id || '';
}

function generationFromHistory(historyItem, order) {
  const clientId = getHistoryClientId(historyItem);
  if (clientId !== CLIENT_ID) return null;

  const imageInfo = normalizeImageInfo(findGeneratedImage(historyItem));
  if (!imageInfo?.filename || !imageInfo.filename.startsWith('Infinite_')) return null;

  const key = imageKeyFromInfo(imageInfo);
  if (deletedImageKeys.has(key)) return null;

  const dimensions = getHistoryDimensions(historyItem);
  return {
    title: getHistoryPrompt(historyItem),
    imgSrc: normalizeImageSrc(buildImageUrl(imageInfo)),
    imageInfo,
    key,
    createdAt: getHistoryTimestamp(historyItem, Date.now() + order),
    width: dimensions.width,
    height: dimensions.height,
    clientId
  };
}

async function refreshRemoteWork() {
  if (!COMFY_HOST) return;

  try {
    const res = await apiFetch('/queue', { cache: 'no-store' }, 8000);
    if (!res.ok) return;

    const queue = await res.json();
    hasRemoteWork = Boolean(
      queue?.queue_running?.length ||
      queue?.queue_pending?.length
    );
    updatePlayState();
  } catch (err) {
    console.warn('[infini] queue check failed', err);
  }
}

async function refreshDeletedImages() {
  if (!COMFY_HOST || isHostedHereNow(location.hostname)) return false;

  try {
    const res = await apiFetch(`/deleted?clientId=${encodeURIComponent(CLIENT_ID)}`, { cache: 'no-store' }, 8000);
    if (!res.ok) return false;

    const data = await res.json();
    const nextDeletedKeys = new Set(Array.isArray(data.keys) ? data.keys : []);
    let didChange = nextDeletedKeys.size !== deletedImageKeys.size ||
      [...nextDeletedKeys].some((key) => !deletedImageKeys.has(key));

    deletedImageKeys = nextDeletedKeys;
    const currentKey = generations[currentGenerationIndex]?.key;
    const previousLength = generations.length;
    generations = generations.filter((gen) => !deletedImageKeys.has(gen.key));
    if (generations.length !== previousLength) {
      save();
      didChange = true;
      if (currentKey && deletedImageKeys.has(currentKey)) {
        selectNearestGeneration(Math.min(currentGenerationIndex, generations.length - 1));
      } else if (currentGenerationIndex >= generations.length) {
        selectNearestGeneration(generations.length - 1);
      }
    }

    return didChange;
  } catch (err) {
    console.warn('[infini] deleted index sync failed', err);
    return false;
  }
}

async function syncRemoteHistory() {
  if (!COMFY_HOST || isHostedHereNow(location.hostname)) return;

  try {
    const didPruneMissing = await pruneMissingGenerations();
    const didFilterDeleted = await refreshDeletedImages();
    const res = await apiFetch('/history', { cache: 'no-store' }, 20000);
    if (!res.ok) return;

    const history = await res.json();
    const remoteGenerations = Object.values(history)
      .map(generationFromHistory)
      .filter(Boolean)
      .sort((a, b) => a.createdAt - b.createdAt)
      .slice(-160);
    const availableRemoteGenerations = await filterAvailableGenerations(remoteGenerations);

    if (!availableRemoteGenerations.length) {
      if (didFilterDeleted || didPruneMissing) {
        renderCarousel();
        updatePlayState();
      }
      return;
    }

    const existingKeys = new Set(generations.map((gen) => gen.key || normalizeImageSrc(gen.imgSrc)));
    let didImport = false;

    for (const generation of availableRemoteGenerations) {
      const key = generation.key || normalizeImageSrc(generation.imgSrc);
      if (existingKeys.has(key)) continue;
      generations.push(generation);
      existingKeys.add(key);
      didImport = true;
    }

    if (!didImport) {
      if (didFilterDeleted || didPruneMissing) {
        renderCarousel();
        updatePlayState();
      }
      return;
    }

    generations.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
    save();

    if (currentGenerationIndex < 0 || !$imageLayers.some((layer) => layer.getAttribute('src'))) {
      selectGeneration(generations.length - 1, false);
    }
    renderCarousel();
    updatePlayState();
  } catch (err) {
    console.warn('[infini] history sync failed', err);
  }
}

  if (PROMPT_EXAMPLES.length <= 1) return 0;

  let nextIndex = demoPromptIndex;
  while (nextIndex === demoPromptIndex) {

  if (($promptInput.value || '').trim()) {

  currentDemoPrompt = PROMPT_EXAMPLES[demoPromptIndex] || DEFAULT_PROMPT;

  if (demoCharIndex < currentDemoPrompt.length) {
    demoCharIndex++;
    updatePromptDemoPlaceholder();
    schedulePromptDemo(
      demoCharIndex >= currentDemoPrompt.length
        ? PROMPT_DEMO_HOLD_MS
        : 42 + Math.random() * 34

    return;

  $promptInput.classList.add('is-demo-fading');
  stopPromptDemo();
  demoPromptTimer = setTimeout(() => {
    demoPromptIndex = pickNextDemoPromptIndex();
    currentDemoPrompt = PROMPT_EXAMPLES[demoPromptIndex] || DEFAULT_PROMPT;
    demoCharIndex = 0;

    $promptInput.classList.remove('is-demo-fading');

function addTone(ctx, destination, startTime, duration, startFreq, endFreq, gainValue, panValue = 0) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const pan = ctx.createStereoPanner ? ctx.createStereoPanner() : null;

  osc.type = 'sine';
  osc.frequency.setValueAtTime(startFreq, startTime);
  osc.frequency.exponentialRampToValueAtTime(endFreq, startTime + duration);

  gain.gain.setValueAtTime(0.0001, startTime);
  gain.gain.exponentialRampToValueAtTime(gainValue, startTime + duration * .18);
  gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

  if (pan) {
    pan.pan.setValueAtTime(panValue, startTime);
    osc.connect(gain).connect(pan).connect(destination);
  } else {
    osc.connect(gain).connect(destination);
  }

  osc.start(startTime);
  osc.stop(startTime + duration + .04);
}

function addNoiseWash(ctx, destination, startTime, duration, gainValue) {
  const buffer = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * duration), ctx.sampleRate);
  const data = buffer.getChannelData(0);

  for (let i = 0; i < data.length; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  }

  const source = ctx.createBufferSource();
  const filter = ctx.createBiquadFilter();
  const gain = ctx.createGain();

  source.buffer = buffer;
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(420, startTime);
  filter.frequency.exponentialRampToValueAtTime(1800, startTime + duration * .45);
  filter.frequency.exponentialRampToValueAtTime(260, startTime + duration);

  gain.gain.setValueAtTime(0.0001, startTime);
  gain.gain.exponentialRampToValueAtTime(gainValue, startTime + duration * .22);
  gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

  source.connect(filter).connect(gain).connect(destination);
  source.start(startTime);
  source.stop(startTime + duration + .04);
}

function playWaveSound(kind = 'start') {
  const ctx = getAudioContext();
  if (!ctx) return;

  const profiles = {
    splash: { duration: 2.7, peak: .42, filter: 1400, delay: .28, feedback: .22 },
    start: { duration: 1.35, peak: .34, filter: 1900, delay: .28, feedback: .22 },
    stop: { duration: 1.45, peak: .18, filter: 1180, delay: .34, feedback: .16 },
    transition: { duration: 1.8, peak: .13, filter: 1320, delay: .42, feedback: .12 },
    screen: { duration: 2.45, peak: .105, filter: 1120, delay: .48, feedback: .13 },
    reset: { duration: 1.65, peak: .24, filter: 1650, delay: .18, feedback: .1 },
    snap: { duration: .16, peak: .08, filter: 2600, delay: .08, feedback: .035 }
  };
  const profile = profiles[kind] || profiles.start;
  const peakGain = Math.min(.72, profile.peak * AUDIO_MASTER_GAIN);
  const now = ctx.currentTime + .025;
  const duration = profile.duration;
  const output = ctx.createGain();
  const filter = ctx.createBiquadFilter();
  const delay = ctx.createDelay();
  const feedback = ctx.createGain();

  output.gain.setValueAtTime(0.0001, now);
  output.gain.exponentialRampToValueAtTime(peakGain, now + .12);
  output.gain.exponentialRampToValueAtTime(0.0001, now + duration + .55);

  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(profile.filter, now);
  filter.Q.setValueAtTime(.5, now);

  delay.delayTime.setValueAtTime(profile.delay, now);
  feedback.gain.setValueAtTime(profile.feedback, now);

  output.connect(filter).connect(ctx.destination);
  filter.connect(delay).connect(feedback).connect(delay);
  delay.connect(ctx.destination);

  if (kind === 'splash') {
    addTone(ctx, output, now, duration, 132, 196, .1, -.18);
    addTone(ctx, output, now + .18, duration * .92, 264, 396, .075, .18);
    addTone(ctx, output, now + .62, duration * .66, 528, 704, .045, 0);
    addNoiseWash(ctx, output, now, duration, .055);
  } else if (kind === 'stop') {
    addTone(ctx, output, now, duration, 330, 196, .052, -.1);
    addTone(ctx, output, now + .12, duration * .9, 220, 147, .042, .12);
    addNoiseWash(ctx, output, now, duration * .82, .018);
  } else if (kind === 'transition') {
    addTone(ctx, output, now, duration, 220, 294, .036, -.16);
    addTone(ctx, output, now + .22, duration * .88, 440, 392, .028, .16);
    addNoiseWash(ctx, output, now + .05, duration * .9, .015);
  } else if (kind === 'screen') {
    addTone(ctx, output, now, duration, 174, 220, .028, -.18);
    addTone(ctx, output, now + .26, duration * .9, 348, 294, .022, .18);
    addNoiseWash(ctx, output, now + .08, duration * .92, .012);
  } else if (kind === 'reset') {
    addTone(ctx, output, now, duration, 523, 392, .05, -.08);
    addTone(ctx, output, now + .1, duration * .84, 262, 131, .058, .08);
    addNoiseWash(ctx, output, now, duration, .028);
  } else if (kind === 'snap') {
    addTone(ctx, output, now, duration, 660, 990, .028, -.08);
    addTone(ctx, output, now + .025, duration * .78, 990, 740, .018, .08);
  } else {
    addTone(ctx, output, now, duration, 196, 330, .085, -.12);
    addTone(ctx, output, now + .08, duration * .92, 392, 660, .06, .12);
    addNoiseWash(ctx, output, now, duration * .86, .035);
  }
}

function finishSplash() {
  if (!$splash) return;

  setTimeout(() => {
    $splash.classList.add('is-hidden');
  }, 3400);
}

function hideSplash() {
  if (!$splash) return;
  $splash.classList.add('is-hidden');
}

function clearImageTransitionTimer() {
  if (imageTransitionTimer) {
    clearTimeout(imageTransitionTimer);
    imageTransitionTimer = null;
  }
}

function resetImageLayer(layer) {
  layer.onload = null;
  layer.onerror = null;
  layer.removeAttribute('src');
  layer.className = 'main-img';
}

function clearCurrentImageView() {
  clearImageTransitionTimer();
  $imageLayers.forEach(resetImageLayer);
  activeImageLayer = 0;
  currentGenerationIndex = -1;
  $imageWrap.classList.remove('is-transitioning', 'is-slow-transition');
  $placeholder.textContent = '';
  applyArtOrientation(1200, 675);
}

function selectNearestGeneration(preferredIndex = currentGenerationIndex) {
  if (generations.length === 0) {
    clearCurrentImageView();
    return;
  }

  const nextIndex = Math.max(0, Math.min(preferredIndex, generations.length - 1));
  selectGeneration(nextIndex, false);
}

function removeGenerationsByKeys(keys) {
  if (!keys?.size) return false;

  const currentKey = generations[currentGenerationIndex]?.key;
  const preferredIndex = currentGenerationIndex >= 0
    ? currentGenerationIndex
    : generations.length - 1;
  const previousLength = generations.length;

  generations = generations.filter((gen) => !keys.has(gen.key));
  if (generations.length === previousLength) return false;

  selectedGridKeys.forEach((key) => {
    if (keys.has(key)) selectedGridKeys.delete(key);
  });
  save();

  if (currentKey && !keys.has(currentKey)) {
    const retainedIndex = generations.findIndex((gen) => gen.key === currentKey);
    if (retainedIndex >= 0) currentGenerationIndex = retainedIndex;
  } else {
    selectNearestGeneration(Math.min(preferredIndex, generations.length - 1));
  }

  renderCarousel();
  renderGridPanel();
  updatePlayState();
  return true;
}

function isGridPanelOpen() {
  return isBrowseGridMode || isDeleteMode || isDownloadMode;
}

function setGridMode(mode) {
  isBrowseGridMode = mode === 'grid';
  isDeleteMode = mode === 'delete';
  isDownloadMode = mode === 'download';
  document.body.classList.toggle('delete-mode', isGridPanelOpen());
  $deletePanel.setAttribute('aria-hidden', String(!isGridPanelOpen()));
  selectedGridKeys.clear();

  if (isGridPanelOpen() && isFillMode) exitFillMode();
  if (isDownloadMode && currentGenerationIndex >= 0) {
    const currentKey = generations[currentGenerationIndex]?.key;
    if (currentKey) selectedGridKeys.add(currentKey);
  }

  renderGridPanel();
  updatePlayState();
}

function setDeleteMode(isActive) {
  setGridMode(isActive ? 'delete' : '');
}

function setDownloadMode(isActive) {
  setGridMode(isActive ? 'download' : '');
}

function setBrowseGridMode(isActive) {
  setGridMode(isActive ? 'grid' : '');
}

function renderGridPanel() {
  $deleteGrid.innerHTML = '';

  const panelItems = generations
    .map((gen, index) => ({ gen, index }))
    .filter(({ gen }) => gen.imgSrc && gen.key && (isBrowseGridMode || gen.imageInfo?.filename));
  const actionWord = isDownloadMode ? 'download' : (isDeleteMode ? 'delete' : 'view');
  const currentKey = generations[currentGenerationIndex]?.key;

  if (!panelItems.length) {
    const empty = document.createElement('div');
    empty.className = 'delete-empty';
    empty.textContent = isBrowseGridMode ? 'nothing to view' : `nothing to ${actionWord}`;
    $deleteGrid.appendChild(empty);
    $deleteConfirm.disabled = false;
    $deleteConfirm.textContent = 'done';
    $deleteCancel.hidden = true;
    return;
  }

  for (const { gen, index } of panelItems) {
    const isSelected = isBrowseGridMode
      ? gen.key === currentKey
      : selectedGridKeys.has(gen.key);
    const thumb = document.createElement('button');
    thumb.className = `delete-thumb${isSelected ? ' is-selected' : ''}`;
    thumb.type = 'button';
    thumb.setAttribute('aria-label', gen.title || `${actionWord} image`);
    thumb.setAttribute('aria-pressed', String(isSelected));

    const img = document.createElement('img');
    img.src = normalizeImageSrc(gen.imgSrc);
    img.alt = gen.title || '';
    img.draggable = false;
    thumb.appendChild(img);

    thumb.addEventListener('click', () => {
      if (isBrowseGridMode) {
        selectGeneration(index, true, false, { playSnap: index !== currentGenerationIndex });
        setGridMode('');
        return;
      }

      if (selectedGridKeys.has(gen.key)) {
        selectedGridKeys.delete(gen.key);
      } else {
        selectedGridKeys.add(gen.key);
      }
      renderGridPanel();
    });

    $deleteGrid.appendChild(thumb);
  }

  if (isBrowseGridMode) {
    $deleteConfirm.disabled = false;
    $deleteConfirm.textContent = 'done';
    $deleteCancel.hidden = true;
    return;
  }

  const hasSelection = selectedGridKeys.size > 0;
  $deleteConfirm.disabled = false;
  $deleteConfirm.textContent = hasSelection
    ? `${actionWord} ${selectedGridKeys.size}`
    : 'done';
  $deleteCancel.hidden = !hasSelection;
  $deleteCancel.textContent = 'done';
}

function sanitizeDownloadName(value, fallback) {
  const filename = String(value || fallback || 'infini.png')
    .replace(/[\\/:"*?<>|]+/g, '-')
    .replace(/\s+/g, ' ')
    .trim();
  return filename || fallback || 'infini.png';
}

function downloadBlob(blob, filename) {
  const objectUrl = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = objectUrl;
  link.download = filename;
  link.rel = 'noopener';
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(() => URL.revokeObjectURL(objectUrl), 2500);
}

async function downloadGeneration(gen, index) {
  const res = await fetchWithTimeout(normalizeImageSrc(gen.imgSrc), {
    cache: 'no-store'
  }, 30000);

  if (res.status === 404 || res.status === 410) {
    const err = new Error('missing source');
    err.missingKey = gen.key;
    throw err;
  }

  if (!res.ok) throw new Error(`download failed ${res.status}`);

  const blob = await res.blob();
  const fallback = `infini-${String(index + 1).padStart(3, '0')}.png`;
  downloadBlob(blob, sanitizeDownloadName(gen.imageInfo?.filename, fallback));
}

async function downloadSelectedImages() {
  if (selectedGridKeys.size === 0) return;

  const targets = generations.filter((gen) =>
    selectedGridKeys.has(gen.key) && gen.imageInfo?.filename
  );
  if (!targets.length) return;

  $deleteConfirm.disabled = true;
  $deleteConfirm.textContent = 'downloading';

  const missingKeys = new Set();

  for (let i = 0; i < targets.length; i++) {
    try {
      await downloadGeneration(targets[i], i);
      if (i < targets.length - 1) await new Promise((resolve) => setTimeout(resolve, 180));
    } catch (err) {
      if (err.missingKey) {
        missingKeys.add(err.missingKey);
      } else {
        console.warn('[infini] download failed', err);
      }
    }
  }

  if (missingKeys.size > 0) {
    removeGenerationsByKeys(missingKeys);
  }

  selectedGridKeys.clear();
  renderGridPanel();
}

async function deleteSelectedImages() {
  if (selectedGridKeys.size === 0) return;

  const targets = generations.filter((gen) =>
    selectedGridKeys.has(gen.key) && gen.imageInfo?.filename
  );
  if (!targets.length) return;

  $deleteConfirm.disabled = true;
  $deleteConfirm.textContent = 'deleting';

  try {
    const res = await apiFetch('/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        clientId: CLIENT_ID,
        images: targets.map((gen) => gen.imageInfo)
      })
    }, 30000);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'delete failed');

    const deletedKeys = new Set((data.deleted || []).map((item) => item.key).filter(Boolean));
    if (data.rejected?.length) console.warn('[infini] delete rejected', data.rejected);
    if (deletedKeys.size === 0) {
      renderGridPanel();
      return;
    }

    deletedKeys.forEach((key) => deletedImageKeys.add(key));
    selectedGridKeys.clear();
    removeGenerationsByKeys(deletedKeys);
    renderGridPanel();
  } catch (err) {
    console.warn('[infini] delete failed', err);
    renderGridPanel();
  }
}

function loadMainImage(src, options = {}) {
  const nextSrc = normalizeImageSrc(src);
  if (!nextSrc) return;

  const currentLayer = $imageLayers[activeImageLayer];
  if (currentLayer.getAttribute('src') === nextSrc && currentLayer.classList.contains('is-visible')) {
    return;
  }

  clearImageTransitionTimer();

  const nextLayerIndex = 1 - activeImageLayer;
  const nextLayer = $imageLayers[nextLayerIndex];
  const hasCurrentImage = Boolean(currentLayer.getAttribute('src'));
  const transitionSound = options.transitionSound || (options.playTransitionSound ? 'transition' : '');
  const isSlowTransition = Boolean(options.slowTransition);
  const transitionDuration = isSlowTransition ? SLOW_IMAGE_TRANSITION_MS : IMAGE_TRANSITION_MS;
  let didHandleLoad = false;

  nextLayer.onload = () => {
    if (didHandleLoad) return;
    didHandleLoad = true;
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        if (hasCurrentImage) {
          if (transitionSound) playWaveSound(transitionSound);
          currentLayer.className = 'main-img is-exiting';
          $imageWrap.classList.toggle('is-slow-transition', isSlowTransition);
          $imageWrap.classList.add('is-transitioning');
        } else {
          currentLayer.className = 'main-img';
          $imageWrap.classList.remove('is-transitioning', 'is-slow-transition');
        }

        nextLayer.className = hasCurrentImage ? 'main-img is-entering' : 'main-img is-visible';
        activeImageLayer = nextLayerIndex;

        imageTransitionTimer = setTimeout(() => {
          nextLayer.className = 'main-img is-visible';
          if (hasCurrentImage) resetImageLayer(currentLayer);
          $imageWrap.classList.remove('is-transitioning', 'is-slow-transition');
          imageTransitionTimer = null;
        }, hasCurrentImage ? transitionDuration : 0);
      });
    });
  };
  nextLayer.onerror = async () => {
    if (didHandleLoad) return;
    const failedGeneration = generations.find((gen) => normalizeImageSrc(gen.imgSrc) === nextSrc);
    if (!failedGeneration) return;
    if (await generationSourceExists(failedGeneration)) return;
    didHandleLoad = true;
    removeGenerationsByKeys(new Set([failedGeneration.key]));
  };
  nextLayer.alt = currentRunPrompt;
  nextLayer.src = nextSrc;

  if (nextLayer.complete) nextLayer.onload();
}

/* When image arrives from ComfyUI */
function onImageReady(url, dimensions = currentRunDimensions, imgInfo = null) {
  const imgSrc = normalizeImageSrc(url);
  const imageInfo = normalizeImageInfo(imgInfo) || imageInfoFromSrc(imgSrc);
  generations.push({
    title: currentRunPrompt,
    imgSrc,
    imageInfo,
    key: imageKeyFromInfo(imageInfo) || imgSrc,
    createdAt: Date.now(),
    width: dimensions.width,
    height: dimensions.height,
    clientId: CLIENT_ID
  });
  latestPopIndex = generations.length - 1;
  save();
  stopProgressFallback();
  setGenerationProgress(generationProgress.max, generationProgress.max);
  isGenerating = false;

  selectGeneration(generations.length - 1, false, true);

  renderCarousel();
  updatePlayState();

  if (isPlaying) {
    setTimeout(startNextGeneration, 600);
  }
}

function updatePlayState() {
  const isRunning = isPlaying || isGenerating || hasRemoteWork;
  document.body.classList.toggle('is-running', isRunning);
  $playBtn.classList.toggle('is-playing', isRunning);
  $playBtn.setAttribute('aria-pressed', String(isRunning));
  $playBtn.textContent = isRunning ? 'stop' : 'start';
  $playBtn.setAttribute('aria-label', isRunning ? 'Stop generation' : 'Start generation');
  $galleryBtn.classList.toggle('is-active', isGalleryVisible);
  $galleryBtn.setAttribute('aria-pressed', String(isGalleryVisible));
  $gridBtn.classList.toggle('is-active', isBrowseGridMode);
  $gridBtn.setAttribute('aria-pressed', String(isBrowseGridMode));
  $downloadBtn.classList.toggle('is-active', isDownloadMode);
  $downloadBtn.setAttribute('aria-pressed', String(isDownloadMode));
  $deleteBtn.classList.toggle('is-active', isDeleteMode);
  $deleteBtn.setAttribute('aria-pressed', String(isDeleteMode));
  $fillBtn.classList.toggle('is-active', isFillMode);
  $fillBtn.setAttribute('aria-pressed', String(isFillMode));
  $fillBtn.setAttribute('aria-label', isFillMode ? 'Exit fullscreen' : 'Enter fullscreen');
  $promptInput.readOnly = isRunning;
  updatePromptClearButton();
  const selectedGeneration = generations[currentGenerationIndex];
  const activePromptTitle = isRunning ? currentRunPrompt : (selectedGeneration?.title || '');
  document.body.classList.toggle('has-active-prompt', Boolean(activePromptTitle));
  $activePrompt.textContent = activePromptTitle;
  const showIndicator = isGenerating || hasRemoteWork;
  $spinner.classList.toggle('is-first', showIndicator && generations.length === 0);
  $spinner.classList.toggle('has-progress', showIndicator);
  $spinner.classList.toggle('show', showIndicator);
  updateGalleryVisibility();
}

function updateGalleryVisibility() {
  const shouldShow = generations.length > 0 && isGalleryVisible && !isFillMode && !isGridPanelOpen();
  $carouselTrack.classList.toggle('hidden', !shouldShow);
}

function startNextGeneration() {
  if (!isPlaying || isGenerating) return;

  nextPromptVariation();
  isGenerating = true;
  resetGenerationProgress();
  startProgressFallback();
  updatePlayState();
  generate(generationRun, currentRunPrompt);
}

function shouldUseTailnetOrigin() {
  if (!isHostedHereNow(location.hostname) || !COMFY_HOST) return false;

  try {
    const hostname = new URL(COMFY_HOST, location.href).hostname;
    return isTailscaleHost(hostname) || isPrivateHost(hostname) || hostname.endsWith('.local');
  } catch {
    return false;
  }
}

function buildTailnetLaunchUrl(promptText, options = {}) {
  const url = new URL(`${COMFY_HOST.replace(/\/+$/, '')}/`);
  const prompt = cleanPrompt(promptText);
  if (prompt) url.searchParams.set('prompt', prompt);
  if (options.auto) url.searchParams.set('auto', '1');
  if (options.start) url.searchParams.set('start', '1');
  return url.toString();
}

function redirectToTailnetApp(options = {}) {
  const launchUrl = buildTailnetLaunchUrl(options.promptText || getPromptText(), options);
  location.replace(launchUrl);
}

function launchTailnetApp(source = 'menu', promptText = getPromptText(), isAutoPrompt = false) {
  playWaveSound(source === 'splash' ? 'splash' : 'start');
  currentRunPrompt = promptText;
  isPlaying = true;
  isGenerating = true;
  hasRemoteWork = false;
  hideSplash();
  resetGenerationProgress();
  startProgressFallback();
  updatePlayState();

  setTimeout(() => {
    redirectToTailnetApp({ start: true, auto: true, promptText });
  }, 260);
}

async function stopGeneration() {
  playWaveSound('stop');
  generationRun++;
  isPlaying = false;
  isGenerating = false;
  hasRemoteWork = false;
  activePromptId = null;
  stopProgressFallback();
  resetGenerationProgress();
  closeProgressSocket();
  updatePlayState();
  await stopComfyWork();
  setTimeout(refreshRemoteWork, 750);
}

function startGeneration(source = 'menu') {
  if (isPlaying || isGenerating) return;
  if (!ensureComfyHost()) return;
  if (isGridPanelOpen()) setGridMode('');
  const typedPrompt = getTypedPrompt();
  const seedPrompt = getSeedPrompt();

  if (shouldUseTailnetOrigin()) {
    launchTailnetApp(source, seedPrompt, !typedPrompt);
    return;
  }

  playWaveSound(source === 'splash' ? 'splash' : 'start');

  generationRun++;
  beginPromptRun();
  hasRemoteWork = false;
  isPlaying = true;
  hideSplash();
  updatePlayState();
  startNextGeneration();
}

function resetLibrary() {
  playWaveSound('reset');
  generationRun++;
  isPlaying = false;
  isGenerating = false;
  hasRemoteWork = false;
  isGalleryVisible = true;
  isBrowseGridMode = false;
  isDeleteMode = false;
  isDownloadMode = false;
  document.body.classList.remove('delete-mode');
  $deletePanel.setAttribute('aria-hidden', 'true');
  selectedGridKeys.clear();
  activePromptId = null;
  stopProgressFallback();
  resetGenerationProgress();
  closeProgressSocket();
  latestPopIndex = -1;
  currentGenerationIndex = -1;
  currentRunDimensions = { width: 1200, height: 675 };
  applyArtOrientation(currentRunDimensions.width, currentRunDimensions.height);
  generations = [];

  try { localStorage.removeItem('infinite_gen'); } catch {}

  clearCurrentImageView();
  renderCarousel();
  renderGridPanel();
  updatePlayState();
  stopComfyWork();
}

$playBtn.addEventListener('click', () => {
  if (isPlaying || isGenerating || hasRemoteWork) {
    stopGeneration();
    return;

  startGeneration('menu');
});

function isInteractiveTarget(target) {

function startFillSwipe(e) {
  if (!isFillMode || isInteractiveTarget(e.target)) return;

  fillSwipePointerId = e.pointerId;
  fillSwipeStartX = e.clientX;
  fillSwipeStartY = e.clientY;
  showFillExitControl();
}

function finishFillSwipe(e) {
  if (!isFillMode || fillSwipePointerId !== e.pointerId) return;

  const deltaX = e.clientX - fillSwipeStartX;
  const deltaY = e.clientY - fillSwipeStartY;
  fillSwipePointerId = null;

  if (!canKeyboardCycleGallery()) return;
  if (Math.abs(deltaX) < 52 || Math.abs(deltaX) < Math.abs(deltaY) * 1.35) return;

  cycleGalleryByKeyboard(deltaX < 0 ? 1 : -1);
}

async function enterFillMode() {
  if (isGridPanelOpen()) setGridMode('');
  isFillMode = true;
  document.body.classList.add('fill-mode');
  if (document.activeElement === $promptInput) $promptInput.blur();
  showLatestInFillMode();
  updatePlayState();
  showFillExitControl(1800);

  try {
    if (document.documentElement.requestFullscreen && !document.fullscreenElement) {
      await document.documentElement.requestFullscreen();
    }
  } catch {}
}

async function exitFillMode() {
  isFillMode = false;
  document.body.classList.remove('fill-mode');
  hideFillExitControl();
  updatePlayState();

  try {
    if (document.exitFullscreen && document.fullscreenElement) {
      await document.exitFullscreen();
    }
  } catch {}
}

$galleryBtn.addEventListener('click', () => {
  setGalleryVisible(!isGalleryVisible);
});

$gridBtn.addEventListener('click', () => {
  setBrowseGridMode(!isBrowseGridMode);
});

$downloadBtn.addEventListener('click', () => {
  setDownloadMode(!isDownloadMode);
});

$deleteBtn.addEventListener('click', () => {
  setDeleteMode(!isDeleteMode);
});

$deleteConfirm.addEventListener('click', () => {
  if (selectedGridKeys.size === 0) {
    setGridMode('');
    return;
  }

  if (isDownloadMode) {
    downloadSelectedImages();
  } else if (isDeleteMode) {
    deleteSelectedImages();
  }
});
$deleteCancel.addEventListener('click', () => setGridMode(''));

$fillBtn.addEventListener('click', () => {
  if (isFillMode) {
    exitFillMode();
  } else {
    enterFillMode();
  }
});

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && isFillMode) {
    isFillMode = false;
    document.body.classList.remove('fill-mode');
    hideFillExitControl();
    updatePlayState();
  }
});

document.addEventListener('pointerdown', (e) => {
  startFillSwipe(e);
}, { passive: true });

document.addEventListener('pointerup', (e) => {
  finishFillSwipe(e);
}, { passive: true });

document.addEventListener('pointercancel', () => {
  fillSwipePointerId = null;
}, { passive: true });

function canKeyboardCycleGallery() {
  return isFillMode &&
    !isPlaying &&
    !isGenerating &&
    !hasRemoteWork &&
    generations.length > 1;
}

function cycleGalleryByKeyboard(direction) {
  if (!canKeyboardCycleGallery()) return;

  const currentIndex = currentGenerationIndex >= 0 ? currentGenerationIndex : generations.length - 1;
  const nextIndex = (currentIndex + direction + generations.length) % generations.length;
  selectGeneration(nextIndex, false, false, {
    slowTransition: true,
    transitionSound: 'screen'
  });
}

document.addEventListener('keydown', (e) => {
  if (e.defaultPrevented || e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
  if (!canKeyboardCycleGallery()) return;

  e.preventDefault();
  cycleGalleryByKeyboard(e.key === 'ArrowRight' ? 1 : -1);
});

function canScrollCarousel() {
  return !isFillMode &&
    isGalleryVisible &&
    !isGridPanelOpen() &&
    generations.length > 1;
}

function moveCarouselSelection(direction) {
  const currentIndex = currentGenerationIndex >= 0 ? currentGenerationIndex : generations.length - 1;
  const nextIndex = Math.max(0, Math.min(generations.length - 1, currentIndex + direction));
  if (nextIndex === currentIndex) return false;

  selectGeneration(nextIndex, true, false, { playSnap: true });
  return true;
}

function startCarouselSwipe(e) {
  if (!canScrollCarousel() || e.button > 0) return;

  carouselPointerId = e.pointerId;
  carouselStartX = e.clientX;
  carouselStartY = e.clientY;
  carouselStepX = e.clientX;
  carouselDidDrag = false;
  $carouselInner.classList.add('is-dragging');

  try { $carouselInner.setPointerCapture(e.pointerId); } catch {}
}

function dragCarouselSwipe(e) {
  if (carouselPointerId !== e.pointerId) return;

  const totalX = e.clientX - carouselStartX;
  const totalY = e.clientY - carouselStartY;
  if (Math.abs(totalX) < 10 && Math.abs(totalY) < 10) return;
  if (Math.abs(totalX) < Math.abs(totalY) * 1.15) return;

  e.preventDefault();

  const deltaX = e.clientX - carouselStepX;
  if (Math.abs(deltaX) < 44) return;

  const didMove = moveCarouselSelection(deltaX < 0 ? 1 : -1);
  carouselStepX = e.clientX;
  carouselDidDrag = carouselDidDrag || didMove;
}

function finishCarouselSwipe(e) {
  if (carouselPointerId !== e.pointerId) return;

  const totalX = e.clientX - carouselStartX;
  const totalY = e.clientY - carouselStartY;

  if (!carouselDidDrag && Math.abs(totalX) >= 52 && Math.abs(totalX) >= Math.abs(totalY) * 1.35) {
    carouselDidDrag = moveCarouselSelection(totalX < 0 ? 1 : -1);
  }

  try { $carouselInner.releasePointerCapture(e.pointerId); } catch {}
  carouselPointerId = null;
  $carouselInner.classList.remove('is-dragging');

  if (carouselDidDrag) {
    carouselSuppressClick = true;
    setTimeout(() => { carouselSuppressClick = false; }, 120);
  }
}

$carouselInner.addEventListener('pointerdown', startCarouselSwipe, { passive: true });
$carouselInner.addEventListener('pointermove', dragCarouselSwipe, { passive: false });
$carouselInner.addEventListener('pointerup', finishCarouselSwipe, { passive: true });
$carouselInner.addEventListener('pointercancel', (e) => {
  if (carouselPointerId !== e.pointerId) return;
  carouselPointerId = null;
  carouselDidDrag = false;
  $carouselInner.classList.remove('is-dragging');
}, { passive: true });
$carouselInner.addEventListener('click', (e) => {
  if (!carouselSuppressClick) return;
  e.preventDefault();
  e.stopPropagation();
  carouselSuppressClick = false;
}, true);
$carouselInner.addEventListener('wheel', (e) => {
  if (!canScrollCarousel()) return;

  const delta = Math.abs(e.deltaX) >= Math.abs(e.deltaY)
    ? e.deltaX
    : (e.shiftKey ? e.deltaY : 0);
  if (!delta) return;

  e.preventDefault();
  carouselWheelDelta += delta;
  if (Math.abs(carouselWheelDelta) < 44) return;

  moveCarouselSelection(carouselWheelDelta > 0 ? 1 : -1);
  carouselWheelDelta = 0;
}, { passive: false });

/* ═══════════════════════════════════════
   Carousel
   ═══════════════════════════════════════ */

const CAROUSEL_RADIUS = 6;

function thumbClassForDistance(distance) {
  if (distance === 0) return 'selected';
  if (distance === 1) return 'near';
  if (distance === 2) return 'mid';
  if (distance <= 4) return 'far';
  return 'edge';
}

function selectGeneration(index, shouldRender = true, fromRight = false, options = {}) {
  if (index < 0 || index >= generations.length) return;

  currentGenerationIndex = index;
  const gen = generations[index];
  applyArtOrientation(gen.width || 1200, gen.height || 675);
  loadMainImage(gen.imgSrc, {
    slowTransition: options.slowTransition || isFillMode,
    transitionSound: options.transitionSound || (fromRight ? (isFillMode ? 'screen' : 'transition') : '')
  });
  if (options.playSnap) playWaveSound('snap');
  $placeholder.textContent = '';
  updatePlayState();

  if (shouldRender) renderCarousel();
}

function renderCarousel() {
     $viewport.innerHTML = '';
     $viewport.style.transform = 'translate(-50%, -50%)';

  if (generations.length === 0) {
    $carouselTrack.style.display = 'none';
    return;
  }

  if (currentGenerationIndex < 0 || currentGenerationIndex >= generations.length) {
    currentGenerationIndex = generations.length - 1;
  }

  $carouselTrack.style.display = 'flex';

  for (let offset = -CAROUSEL_RADIUS; offset <= CAROUSEL_RADIUS; offset++) {
    const i = currentGenerationIndex + offset;
    const distance = Math.abs(offset);

    if (i < 0 || i >= generations.length) {
      const spacer = document.createElement('div');
      spacer.className = `thumb ${thumbClassForDistance(distance)} spacer`;
      $viewport.appendChild(spacer);
      continue;
    }

    const gen = generations[i];
    const div = document.createElement('div');
    div.className = `thumb ${thumbClassForDistance(distance)}${i === latestPopIndex ? ' pop-in' : ''}`;
    div.setAttribute('aria-label', gen.title || `Generation ${i + 1}`);
    div.setAttribute('role', 'button');
    div.tabIndex = 0;
    div.addEventListener('animationend', () => {
      div.classList.remove('pop-in');
      if (i === latestPopIndex) latestPopIndex = -1;
    }, { once: true });

    const img = document.createElement('img');
    img.src = normalizeImageSrc(gen.imgSrc);
    img.alt = gen.title;
    img.draggable = false;
    div.appendChild(img);

       /* Click thumbnail: show it as main image */
    div.addEventListener('click', () => {
       selectGeneration(i, true, false, { playSnap: i !== currentGenerationIndex });
      });
    div.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        selectGeneration(i, true, false, { playSnap: i !== currentGenerationIndex });
      }
    });

     $viewport.appendChild(div);
     }
}

/* ═══════════════════════════════════════
   Init
   ═══════════════════════════════════════ */
async function init() {
  $promptInput.value = loadPrompt();
  resizePromptInput();
  currentRunPrompt = $promptInput.value || autoPromptSeed || currentDemoPrompt || DEFAULT_PROMPT;

  if (shouldUseTailnetOrigin()) {
    redirectToTailnetApp({ start: URL_PARAMS.get('start') === '1' });
    return;
  }

  startPromptDemo();
  smokeTestBridge();
  refreshRemoteWork();
  finishSplash();
  load();
  await pruneMissingGenerations();

  if (generations.length > 0) {
    selectGeneration(generations.length - 1, false);
    renderCarousel();
  } else {
    $placeholder.textContent = '';
  }

  updatePlayState();
  syncRemoteHistory();

  if (URL_PARAMS.get('start') === '1' && !isHostedHereNow(location.hostname)) {
    setTimeout(() => startGeneration('splash'), 650);
  }
}

init().catch((err) => console.warn('[infini] init failed', err));

</script>
