<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>infini</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @property --iris {
      syntax: '<percentage>';
      inherits: false;
      initial-value: 150%;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      padding-bottom: 96px;
      }

    .splash {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #000;
      pointer-events: none;
      z-index: 2000;
      animation: splashFade 3.2s ease forwards;
    }

    .splash.is-hidden {
      display: none;
    }

    .splash-mark {
      color: #fff;
      font-size: clamp(84px, 16vw, 220px);
      font-weight: 800;
      line-height: 1;
      opacity: 0;
      animation: splashMark 2.9s ease forwards;
    }

    @keyframes splashFade {
      0%, 68% { opacity: 1; visibility: visible; }
      100% { opacity: 0; visibility: hidden; }
    }

    @keyframes splashMark {
      0% { opacity: 0; transform: scale(.96); }
      24%, 72% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.025); }
    }

    /* top bar */
    .top-bar {
      width: 100%;
      max-width: 1280px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 44px 48px 0;
      position: relative;
      z-index: 600;
      }

    .title-stack {
      display: flex;
      flex-direction: column;
      gap: 18px;
      }

    .brand {
      color: rgba(255,255,255,.88);
      font-size: 34px;
      font-weight: 500;
      letter-spacing: .2px;
      line-height: 1;
      }

    .top-controls {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 9px;
      }

    .prompt-dock {
      position: absolute;
      top: 44px;
      left: 50%;
      width: min(48vw, 540px);
      transform: translateX(-50%);
      transition: opacity .35s ease;
      }

    .prompt-input {
      width: 100%;
      appearance: none;
      background: transparent;
      border: 0;
      border-bottom: 1px solid rgba(255,255,255,.18);
      border-radius: 0;
      color: rgba(255,255,255,.92);
      font: inherit;
      font-size: 18px;
      font-weight: 400;
      line-height: 1.35;
      outline: none;
      padding: 0 0 9px;
      transition: border-color .25s ease, color .25s ease;
    }

    .prompt-input::placeholder {
      color: rgba(255,255,255,.36);
    }

    .prompt-input:focus {
      border-color: rgba(255,255,255,.58);
      color: #fff;
    }

    .prompt-input:read-only {
      cursor: default;
      opacity: .62;
    }

    .active-prompt {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 12px);
      max-width: min(78vw, 760px);
      color: rgba(255,255,255,.72);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .2px;
      line-height: 1.35;
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
      text-align: center;
      text-overflow: ellipsis;
      text-shadow: 0 2px 18px rgba(0,0,0,.68);
      transform: translateX(-50%);
      transition: opacity .45s ease;
      white-space: nowrap;
      z-index: 700;
    }

    body.is-running .prompt-dock {
      opacity: 0;
      pointer-events: none;
    }

    body.is-running .active-prompt {
      opacity: 1;
    }

    .play-btn,
    .reset-btn,
    .gallery-btn,
    .fill-btn {
      appearance: none;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: .2px;
      line-height: 1;
      opacity: .52;
      padding: 0;
      text-transform: lowercase;
      z-index: 500;
      transition: opacity .25s ease;
      }

    .play-btn:hover,
    .play-btn.is-playing,
    .reset-btn:hover,
    .gallery-btn:hover,
    .gallery-btn.is-active {
      opacity: 1;
      }

    .fill-btn {
      font-size: 24px;
      line-height: .8;
      opacity: .82;
    }

    .fill-btn.is-active,
    .fill-btn:hover {
      opacity: 1;
      }

    /* ── image area ── */
    .image-wrap {
      width: 100%;
      max-width: 1280px;
      aspect-ratio: 16 / 9;
      margin-top: clamp(46px, 6vh, 90px);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,.02);
      transition: opacity .7s ease;
      }

    .main-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transform: scale(1.018);
      z-index: 1;
      }

    .main-img.is-visible {
      opacity: 1;
      transform: scale(1);
      }

    .main-img.is-entering {
      --iris: 0%;
      opacity: 1;
      z-index: 3;
      -webkit-mask-image:
        radial-gradient(circle at center,
          #000 0%,
          #000 max(0%, calc(var(--iris) - 34%)),
          rgba(0,0,0,.78) calc(var(--iris) - 16%),
          transparent var(--iris));
      mask-image:
        radial-gradient(circle at center,
          #000 0%,
          #000 max(0%, calc(var(--iris) - 34%)),
          rgba(0,0,0,.78) calc(var(--iris) - 16%),
          transparent var(--iris));
      animation: irisReveal 6.4s cubic-bezier(.16,.74,.18,1) forwards;
      }

    .main-img.is-exiting {
      opacity: 1;
      z-index: 2;
      animation: softRelease 6.4s ease forwards;
      }

    .image-wrap.is-transitioning::after {
      content: '';
      position: absolute;
      inset: -18%;
      background:
        radial-gradient(circle at center,
          rgba(255,255,255,.24) 0%,
          rgba(255,255,255,.11) 18%,
          rgba(255,255,255,0) 58%);
      mix-blend-mode: soft-light;
      opacity: 0;
      pointer-events: none;
      z-index: 4;
      animation: transitionVeil 6.4s ease forwards;
      }

    @keyframes irisReveal {
      0% {
        --iris: 0%;
        filter: blur(18px) saturate(.9);
        opacity: 0;
        transform: scale(1.035);
      }
      18% {
        opacity: .52;
      }
      68% {
        filter: blur(1px) saturate(1);
      }
      100% {
        --iris: 150%;
        filter: blur(0);
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes softRelease {
      0% {
        filter: blur(0);
        opacity: 1;
        transform: scale(1);
      }
      52% {
        opacity: .82;
      }
      100% {
        filter: blur(14px);
        opacity: 0;
        transform: scale(1.012);
      }
    }

    @keyframes transitionVeil {
      0% {
        opacity: 0;
        transform: scale(.46);
      }
      34% {
        opacity: .22;
      }
      100% {
        opacity: 0;
        transform: scale(1.28);
      }
    }

    .image-wrap .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,.1);
      font-size: 14px;
      letter-spacing: 1px;
      }

    .spinner {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.75);
      z-index: 10;
      }
    .spinner.show { display: flex; }

    .spinner-ring {
      width: 40px; height: 40px;
      border: 2px solid rgba(255,255,255,.12);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── carousel ── */
    .carousel-track {
      position: fixed;
      left: 50%;
      bottom: clamp(32px, 7vh, 88px);
      width: min(76vw, 820px);
      height: 172px;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateX(-50%);
      z-index: 100;
      pointer-events: none;
      }

    .carousel-track.hidden {
      display: none !important;
      }

    .carousel-inner {
      position: relative;
      width: 100%;
      min-width: 0;
      height: 172px;
      overflow: visible;
      pointer-events: auto;
      }

    .carousel-viewport {
      position: absolute;
      left: 50%;
      top: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transform: translate(-50%, -50%);
      transition: transform .42s cubic-bezier(.25,.1,.25,1);
      will-change: transform;
      }

    .thumb {
      flex-shrink: 0;
      width: 34px;
      height: 34px;
      border-radius: 7px;
      overflow: hidden;
      cursor: pointer;
      opacity: .72;
      position: relative;
      transform-origin: center center;
      box-shadow: 0 10px 26px rgba(0,0,0,.42);
      transition:
        width .42s cubic-bezier(.25,.1,.25,1),
        height .42s cubic-bezier(.25,.1,.25,1),
        opacity .28s ease,
        filter .28s ease,
        transform .42s cubic-bezier(.25,.1,.25,1);
      }

    .thumb:hover {
      opacity: 1;
      transform: translateY(-4px);
      }

    .thumb.spacer {
      cursor: default;
      opacity: 0;
      pointer-events: none;
      box-shadow: none;
      }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      }

    .thumb.edge {
      width: 28px;
      height: 28px;
      opacity: .48;
      filter: saturate(.75) brightness(.85);
      }

    .thumb.far {
      width: 46px;
      height: 46px;
      opacity: .62;
      filter: saturate(.82) brightness(.9);
      }

    .thumb.mid {
      width: 72px;
      height: 72px;
      opacity: .78;
      }

    .thumb.near {
      width: 98px;
      height: 98px;
      opacity: .9;
      }

    .thumb.selected {
      width: 122px;
      height: 122px;
      opacity: 1;
      box-shadow: 0 18px 46px rgba(0,0,0,.62);
      }
    .thumb.selected::after {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: 7px;
      border: 2px solid rgba(255,255,255,.55);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.35);
      pointer-events: none;
      }

    .thumb.pop-in {
      animation: popFromRight .58s cubic-bezier(.18,.82,.24,1.08);
      }

    .thumb.selected.pop-in {
      animation-name: popSelectedFromRight;
      }

    @keyframes popFromRight {
      0% {
        opacity: 0;
        transform: translateX(74px) scale(.72);
      }
      72% {
        opacity: 1;
        transform: translateX(-8px) scale(1.06);
      }
      100% {
        transform: translateX(0) scale(1);
      }
    }

    @keyframes popSelectedFromRight {
      0% {
        opacity: 0;
        transform: translateX(96px) scale(.72);
      }
      72% {
        opacity: 1;
        transform: translateX(-10px) scale(1.04);
      }
      100% {
        transform: translateX(0) scale(1);
      }
    }

    /* ── responsive ── */
    @media (max-width: 900px) {
      .top-bar { padding: 30px 20px 0; }
      .brand { font-size: 30px; }
      .title-stack { gap: 12px; }
      .top-controls { gap: 9px; }
      .prompt-dock {
        top: 30px;
        width: min(50vw, 420px);
      }
      .prompt-input {
        font-size: 17px;
      }
      .carousel-track {
        bottom: 28px;
        width: 88vw;
        height: 132px;
      }
      .carousel-inner { height: 132px; }
      .thumb.edge { width: 18px; height: 18px; }
      .thumb.far { width: 28px; height: 28px; }
      .thumb.mid { width: 48px; height: 48px; }
      .thumb.near { width: 72px; height: 72px; }
      .thumb.selected { width: 88px; height: 88px; }
    }

    @media (max-width: 700px) {
      body {
        min-height: 100svh;
        overflow: hidden;
        padding-bottom: 0;
      }

      .top-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        max-width: none;
        padding: calc(env(safe-area-inset-top) + 18px) 18px 0;
        z-index: 600;
      }

      .title-stack { gap: 12px; }

      .brand {
        text-shadow: 0 2px 16px rgba(0,0,0,.48);
      }

      .top-controls {
        text-shadow: 0 2px 14px rgba(0,0,0,.6);
      }

      .prompt-dock {
        top: calc(env(safe-area-inset-top) + 18px);
        width: min(44vw, 240px);
      }

      .prompt-input {
        font-size: 16px;
        text-shadow: 0 2px 14px rgba(0,0,0,.68);
      }

      .active-prompt {
        max-width: 82vw;
        font-size: 12px;
      }

      .image-wrap {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100svh;
        height: 100dvh;
        margin-top: 0;
        max-width: none;
        aspect-ratio: auto;
        border-radius: 0;
        z-index: 0;
      }

      .main-img {
        object-fit: cover;
      }

      .carousel-track {
        bottom: calc(env(safe-area-inset-bottom) + 22px);
        width: 100vw;
        height: 124px;
        z-index: 400;
      }

      .carousel-inner {
        height: 124px;
      }
    }

    body.fill-mode .title-stack {
      opacity: 0;
      pointer-events: none;
      transition: opacity .35s ease;
    }

    body.fill-mode .image-wrap {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      max-width: none;
      margin-top: 0;
      aspect-ratio: auto;
      border-radius: 0;
      background: #000;
      z-index: 0;
    }

    body.fill-mode .main-img {
      object-fit: contain;
      object-position: center center;
    }

    body.fill-mode .fill-btn {
      opacity: 0;
      pointer-events: none;
    }
</style>
</head>
<body>

<div class="splash" id="splash" aria-hidden="true">
     <div class="splash-mark">∞</div>
</div>

<!-- top bar -->
<div class="top-bar">
     <div class="title-stack">
       <div class="brand">infini</div>
       <div class="top-controls">
         <button class="play-btn" id="playBtn" type="button">play</button>
         <button class="reset-btn" id="resetBtn" type="button">reset</button>
         <button class="gallery-btn is-active" id="galleryBtn" type="button">gallery</button>
       </div>
     </div>
     <div class="prompt-dock">
       <input class="prompt-input" id="promptInput" type="text" autocomplete="off" spellcheck="false" aria-label="Prompt" />
     </div>
     <button class="fill-btn" id="fillBtn" type="button" aria-label="Enter fullscreen">↗</button>
</div>

<!-- ── image area ── -->
<div class="image-wrap" id="imageWrap">
     <img class="main-img" id="mainImgA" src="" alt="" />
     <img class="main-img" id="mainImgB" src="" alt="" />
     <div class="placeholder" id="placeholder"></div>
     <div class="spinner" id="spinner"><div class="spinner-ring"></div></div>
</div>

<!-- ── carousel ── -->
<div class="carousel-track" id="carouselTrack" style="display:none">
     <div class="carousel-inner" id="carouselInner">
       <div class="carousel-viewport" id="carouselViewport"></div>
     </div>
</div>

<div class="active-prompt" id="activePrompt"></div>

<script>
/* ═══════════════════════════════════════
   State & Config
   ═══════════════════════════════════════ */
const DEFAULT_PROMPT = 'Quantum Art 35mm Film';
const PREVIOUS_DEFAULT_PROMPT = 'Quantum art';
const API_STORAGE_KEY = 'infini_api_base';
const PROMPT_STORAGE_KEY = 'infini_prompt';
let COMFY_HOST = getComfyHost();
let generations = [];          // { title, imgSrc, createdAt }
let isGenerating = false;
let isPlaying = false;
let isGalleryVisible = true;
let isFillMode = false;
let currentGenerationIndex = -1;
let generationRun = 0;
let activePromptId = null;
let latestPopIndex = -1;
let currentRunPrompt = DEFAULT_PROMPT;

/* ── persist to localStorage ── */
function save() {
  try { localStorage.setItem('infinite_gen', JSON.stringify(generations)); } catch {}
}
function load() {
  try { generations = JSON.parse(localStorage.getItem('infinite_gen') || '[]'); } catch { generations = []; }
  generations = generations.map((gen) => ({
    title: gen.title || DEFAULT_PROMPT,
    imgSrc: normalizeImageSrc(gen.imgSrc),
    createdAt: gen.createdAt || Date.now()
  }));
}

function cleanPrompt(value) {
  return (value || '').trim() || DEFAULT_PROMPT;
}

function loadPrompt() {
  try {
    const storedPrompt = cleanPrompt(localStorage.getItem(PROMPT_STORAGE_KEY));
    return storedPrompt === PREVIOUS_DEFAULT_PROMPT ? DEFAULT_PROMPT : storedPrompt;
  } catch {
    return DEFAULT_PROMPT;
  }
}

function savePrompt(value) {
  try { localStorage.setItem(PROMPT_STORAGE_KEY, cleanPrompt(value)); } catch {}
}

function isPrivateHost(hostname) {
  return hostname === 'localhost' ||
    hostname === '127.0.0.1' ||
    hostname.startsWith('192.168.') ||
    hostname.startsWith('10.') ||
    /^172\.(1[6-9]|2\d|3[0-1])\./.test(hostname);
}

function cleanApiBase(value) {
  return (value || '').trim().replace(/\/+$/, '');
}

function getComfyHost() {
  const params = new URLSearchParams(location.search);
  const queryApi = cleanApiBase(params.get('api'));

  if (queryApi) {
    try { localStorage.setItem(API_STORAGE_KEY, queryApi); } catch {}
    return queryApi;
  }

  try {
    const storedApi = cleanApiBase(localStorage.getItem(API_STORAGE_KEY));
    if (storedApi) return storedApi;
  } catch {}

  if (location.protocol === 'file:') return 'http://localhost:8188';
  if (isPrivateHost(location.hostname)) return location.origin;

  return '';
}

function ensureComfyHost() {
  if (COMFY_HOST) return true;

  const value = cleanApiBase(window.prompt('ComfyUI API URL'));
  if (!value) return false;

  COMFY_HOST = value;
  try { localStorage.setItem(API_STORAGE_KEY, COMFY_HOST); } catch {}
  return true;
}

function normalizeImageSrc(src) {
  if (!src) return '';

  try {
    const url = new URL(src, location.href);
    const isComfyUrl = url.port === '8188' || url.hostname === 'localhost' || url.hostname === '127.0.0.1';

    if (COMFY_HOST && isComfyUrl && COMFY_HOST !== 'http://localhost:8188') {
      return `${COMFY_HOST}${url.pathname}${url.search}`;
    }
  } catch {}

  return src;
}

function findGeneratedImage(historyItem) {
  if (historyItem?.output?.images?.length) {
    return historyItem.output.images[0];
  }

  const outputs = historyItem?.outputs || {};
  for (const output of Object.values(outputs)) {
    if (output?.images?.length) {
      return output.images[0];
    }
  }

  return null;
}

/* ═══════════════════════════════════════
   ComfyUI Communication
   ═══════════════════════════════════════ */

async function interruptGeneration() {
  try {
    await fetch(`${COMFY_HOST}/interrupt`, { method: 'POST' });
  } catch {}
}

async function generate(runId, promptText) {
  const prompt = cleanPrompt(promptText);
  const workflow = {
      "57:28": {             // UNETLoader
        "class_type": "UNETLoader",
        "inputs": {
          "unet_name": "z_image_turbo_bf16.safetensors",
          "weight_dtype": "default"
        }
      },
      "57:11": {             // ModelSamplingAuraFlow
        "class_type": "ModelSamplingAuraFlow",
        "inputs": {
          "shift": 3,
          "model": ["57:28", 0]
        }
      },
      "57:29": {             // VAELoader
        "class_type": "VAELoader",
        "inputs": {
          "vae_name": "ae.safetensors"
        }
      },
      "57:30": {             // CLIPLoader
        "class_type": "CLIPLoader",
        "inputs": {
          "clip_name": "qwen_3_4b.safetensors",
          "type": "lumina2",
          "device": "default"
        }
      },
      "57:13": {             // EmptySD3LatentImage
        "class_type": "EmptySD3LatentImage",
        "inputs": {
          "width": 1200,
          "height": 720,
          "batch_size": 1
        }
      },
      "58": {                // PrimitiveStringMultiline (prompt)
        "class_type": "PrimitiveStringMultiline",
        "inputs": {
          "value": prompt
        }
      },
      "57:27": {             // CLIPTextEncode (prompt)
        "class_type": "CLIPTextEncode",
        "inputs": {
          "text": ["58", 0],
          "clip": ["57:30", 0]
        }
      },
      "57:33": {             // ConditioningZeroOut (no negative)
        "class_type": "ConditioningZeroOut",
        "inputs": {
          "conditioning": ["57:27", 0]
        }
      },
      "57:3": {              // KSampler
        "class_type": "KSampler",
        "inputs": {
          "seed": Math.floor(Math.random() * 999999999),
          "steps": 4,
          "cfg": 1,
          "sampler_name": "res_multistep",
          "scheduler": "simple",
          "denoise": 1,
          "model": ["57:11", 0],
          "positive": ["57:27", 0],
          "negative": ["57:33", 0],
          "latent_image": ["57:13", 0]
        }
      },
      "57:8": {              // VAEDecode
        "class_type": "VAEDecode",
        "inputs": {
          "samples": ["57:3", 0],
          "vae": ["57:29", 0]
        }
      },
      "9": {                 // SaveImage
        "class_type": "SaveImage",
        "inputs": {
          "filename_prefix": "Infinite_",
          "images": ["57:8", 0]
        }
      }
    };

  try {
    const res = await fetch(`${COMFY_HOST}/prompt`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Infini-Client': '2'
      },
      body: JSON.stringify({ prompt: workflow })
        });

    if (!res.ok) throw new Error('Prompt failed');

    const data = await res.json();
    const promptId = data.prompt_id || data.client_id;
    activePromptId = promptId;

         /* poll /history until done */
    let attempts = 0;
    while (attempts < 120) {
      if (runId !== generationRun || !isPlaying) return;
      await new Promise(r => setTimeout(r, 1500));
      if (runId !== generationRun || !isPlaying) return;

      const hRes = await fetch(`${COMFY_HOST}/history/${promptId}`);
      const hData = await hRes.json();

      const imgInfo = findGeneratedImage(hData[promptId]);

      if (imgInfo) {
        if (runId !== generationRun || !isPlaying) return;
          /* build image URL */
        const { filename, subfolder, type } = imgInfo;
        const params = new URLSearchParams({
          filename,
          type: type || 'output'
            });
        if (subfolder) params.set('subfolder', subfolder);
        const url = `${COMFY_HOST}/view?${params}`;
        onImageReady(url);
        return;
         }
      attempts++;
       }
    throw new Error('Generation timed out');

       } catch (err) {
    if (runId !== generationRun) return;
    console.error('[comfy]', err);
    isGenerating = false;
    isPlaying = false;
    updatePlayState();
    $spinner.classList.remove('show');
       } finally {
    if (runId === generationRun) {
      activePromptId = null;
    }
       }
}

/* ═══════════════════════════════════════
   UI Flow
   ═══════════════════════════════════════ */

const $imageWrap    = document.getElementById('imageWrap');
const $imageLayers  = [
  document.getElementById('mainImgA'),
  document.getElementById('mainImgB')
];
const $placeholder  = document.getElementById('placeholder');
const $spinner      = document.getElementById('spinner');
const $playBtn      = document.getElementById('playBtn');
const $resetBtn     = document.getElementById('resetBtn');
const $galleryBtn   = document.getElementById('galleryBtn');
const $fillBtn      = document.getElementById('fillBtn');
const $promptInput  = document.getElementById('promptInput');
const $activePrompt = document.getElementById('activePrompt');
const $splash       = document.getElementById('splash');
const $carouselTrack = document.getElementById('carouselTrack');
const $carouselInner = document.getElementById('carouselInner');
const $viewport     = document.getElementById('carouselViewport');
let activeImageLayer = 0;
let imageTransitionTimer = null;

function getPromptText() {
  const prompt = cleanPrompt($promptInput.value);
  $promptInput.value = prompt;
  savePrompt(prompt);
  return prompt;
}

async function smokeTestBridge() {
  if (!COMFY_HOST) return;

  try {
    await fetch(`${COMFY_HOST}/system_stats`, { cache: 'no-store' });
  } catch (err) {
    console.warn('[infini] bridge smoke test failed', err);
  }
}

function finishSplash() {
  if (!$splash) return;

  setTimeout(() => {
    $splash.classList.add('is-hidden');
  }, 3400);
}

function clearImageTransitionTimer() {
  if (imageTransitionTimer) {
    clearTimeout(imageTransitionTimer);
    imageTransitionTimer = null;
  }
}

function resetImageLayer(layer) {
  layer.onload = null;
  layer.removeAttribute('src');
  layer.className = 'main-img';
}

function loadMainImage(src) {
  const nextSrc = normalizeImageSrc(src);
  if (!nextSrc) return;

  const currentLayer = $imageLayers[activeImageLayer];
  if (currentLayer.getAttribute('src') === nextSrc && currentLayer.classList.contains('is-visible')) {
    return;
  }

  clearImageTransitionTimer();

  const nextLayerIndex = 1 - activeImageLayer;
  const nextLayer = $imageLayers[nextLayerIndex];
  const hasCurrentImage = Boolean(currentLayer.getAttribute('src'));

  nextLayer.onload = () => {
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        if (hasCurrentImage) {
          currentLayer.className = 'main-img is-exiting';
          $imageWrap.classList.add('is-transitioning');
        } else {
          currentLayer.className = 'main-img';
          $imageWrap.classList.remove('is-transitioning');
        }

        nextLayer.className = hasCurrentImage ? 'main-img is-entering' : 'main-img is-visible';
        activeImageLayer = nextLayerIndex;

        imageTransitionTimer = setTimeout(() => {
          nextLayer.className = 'main-img is-visible';
          if (hasCurrentImage) resetImageLayer(currentLayer);
          $imageWrap.classList.remove('is-transitioning');
          imageTransitionTimer = null;
        }, hasCurrentImage ? 6500 : 0);
      });
    });
  };
  nextLayer.alt = currentRunPrompt;
  nextLayer.src = nextSrc;

  if (nextLayer.complete) nextLayer.onload();
}

/* When image arrives from ComfyUI */
function onImageReady(url) {
  const imgSrc = normalizeImageSrc(url);
  generations.push({ title: currentRunPrompt, imgSrc, createdAt: Date.now() });
  latestPopIndex = generations.length - 1;
  save();
  isGenerating = false;

  selectGeneration(generations.length - 1, false, true);

  renderCarousel();
  updatePlayState();

  if (isPlaying) {
    setTimeout(startNextGeneration, 600);
  }
}

function updatePlayState() {
  const isRunning = isPlaying || isGenerating;
  document.body.classList.toggle('is-running', isRunning);
  $playBtn.classList.toggle('is-playing', isPlaying);
  $playBtn.setAttribute('aria-pressed', String(isPlaying));
  $playBtn.textContent = isRunning ? 'stop' : 'play';
  $playBtn.setAttribute('aria-label', isRunning ? 'Stop generation' : 'Start generation');
  $galleryBtn.classList.toggle('is-active', isGalleryVisible);
  $galleryBtn.setAttribute('aria-pressed', String(isGalleryVisible));
  $fillBtn.classList.toggle('is-active', isFillMode);
  $fillBtn.setAttribute('aria-pressed', String(isFillMode));
  $fillBtn.setAttribute('aria-label', isFillMode ? 'Exit fullscreen' : 'Enter fullscreen');
  $promptInput.readOnly = isRunning;
  $activePrompt.textContent = isRunning ? currentRunPrompt : '';
  $spinner.classList.toggle('show', isGenerating && generations.length === 0);
  updateGalleryVisibility();
}

function updateGalleryVisibility() {
  const shouldShow = generations.length > 0 && isGalleryVisible && !isFillMode;
  $carouselTrack.classList.toggle('hidden', !shouldShow);
}

function startNextGeneration() {
  if (!isPlaying || isGenerating) return;

  isGenerating = true;
  updatePlayState();
  generate(generationRun, currentRunPrompt);
}

function stopGeneration() {
  generationRun++;
  isPlaying = false;
  isGenerating = false;
  activePromptId = null;
  updatePlayState();
  interruptGeneration();
}

function resetLibrary() {
  generationRun++;
  isPlaying = false;
  isGenerating = false;
  isGalleryVisible = true;
  activePromptId = null;
  latestPopIndex = -1;
  currentGenerationIndex = -1;
  generations = [];

  try { localStorage.removeItem('infinite_gen'); } catch {}

  clearImageTransitionTimer();
  $imageLayers.forEach(resetImageLayer);
  activeImageLayer = 0;
  $imageWrap.classList.remove('is-transitioning');
  $placeholder.textContent = '';
  renderCarousel();
  updatePlayState();
  interruptGeneration();
}

$playBtn.addEventListener('click', () => {
  if (isPlaying || isGenerating) {
    stopGeneration();
    return;
  }

  if (!ensureComfyHost()) return;

  generationRun++;
  currentRunPrompt = getPromptText();
  isPlaying = true;
  updatePlayState();
  startNextGeneration();
});

$resetBtn.addEventListener('click', resetLibrary);

$promptInput.addEventListener('change', () => savePrompt($promptInput.value));
$promptInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    $promptInput.blur();
    if (!isPlaying && !isGenerating) $playBtn.click();
  }
});

function setGalleryVisible(isVisible) {
  isGalleryVisible = isVisible;
  updatePlayState();
}

function showLatestInFillMode() {
  if (!isFillMode || generations.length === 0) return;
  selectGeneration(generations.length - 1, false);
}

async function enterFillMode() {
  isFillMode = true;
  document.body.classList.add('fill-mode');
  showLatestInFillMode();
  updatePlayState();

  try {
    if (document.documentElement.requestFullscreen && !document.fullscreenElement) {
      await document.documentElement.requestFullscreen();
    }
  } catch {}
}

async function exitFillMode() {
  isFillMode = false;
  document.body.classList.remove('fill-mode');
  updatePlayState();

  try {
    if (document.exitFullscreen && document.fullscreenElement) {
      await document.exitFullscreen();
    }
  } catch {}
}

$galleryBtn.addEventListener('click', () => {
  setGalleryVisible(!isGalleryVisible);
});

$fillBtn.addEventListener('click', () => {
  if (isFillMode) {
    exitFillMode();
  } else {
    enterFillMode();
  }
});

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && isFillMode) {
    isFillMode = false;
    document.body.classList.remove('fill-mode');
    updatePlayState();
  }
});

/* ═══════════════════════════════════════
   Carousel
   ═══════════════════════════════════════ */

const CAROUSEL_RADIUS = 6;

function thumbClassForDistance(distance) {
  if (distance === 0) return 'selected';
  if (distance === 1) return 'near';
  if (distance === 2) return 'mid';
  if (distance <= 4) return 'far';
  return 'edge';
}

function selectGeneration(index, shouldRender = true, fromRight = false) {
  if (index < 0 || index >= generations.length) return;

  currentGenerationIndex = index;
  const gen = generations[index];
  loadMainImage(gen.imgSrc, fromRight);
  $placeholder.textContent = '';
  updatePlayState();

  if (shouldRender) renderCarousel();
}

function renderCarousel() {
     $viewport.innerHTML = '';
     $viewport.style.transform = 'translate(-50%, -50%)';

  if (generations.length === 0) {
    $carouselTrack.style.display = 'none';
    return;
  }

  if (currentGenerationIndex < 0 || currentGenerationIndex >= generations.length) {
    currentGenerationIndex = generations.length - 1;
  }

  $carouselTrack.style.display = 'flex';

  for (let offset = -CAROUSEL_RADIUS; offset <= CAROUSEL_RADIUS; offset++) {
    const i = currentGenerationIndex + offset;
    const distance = Math.abs(offset);

    if (i < 0 || i >= generations.length) {
      const spacer = document.createElement('div');
      spacer.className = `thumb ${thumbClassForDistance(distance)} spacer`;
      $viewport.appendChild(spacer);
      continue;
    }

    const gen = generations[i];
    const div = document.createElement('div');
    div.className = `thumb ${thumbClassForDistance(distance)}${i === latestPopIndex ? ' pop-in' : ''}`;
    div.setAttribute('aria-label', gen.title || `Generation ${i + 1}`);
    div.setAttribute('role', 'button');
    div.tabIndex = 0;
    div.addEventListener('animationend', () => {
      div.classList.remove('pop-in');
      if (i === latestPopIndex) latestPopIndex = -1;
    }, { once: true });

    const img = document.createElement('img');
    img.src = normalizeImageSrc(gen.imgSrc);
    img.alt = gen.title;
    img.draggable = false;
    div.appendChild(img);

       /* Click thumbnail: show it as main image */
    div.addEventListener('click', () => {
       selectGeneration(i);
      });
    div.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        selectGeneration(i);
      }
    });

     $viewport.appendChild(div);
     }
}

/* ═══════════════════════════════════════
   Init
   ═══════════════════════════════════════ */
$promptInput.placeholder = DEFAULT_PROMPT;
$promptInput.value = loadPrompt();
smokeTestBridge();
finishSplash();
load();

if (generations.length > 0) {
     /* Show last generation */
    selectGeneration(generations.length - 1, false);
    renderCarousel();
} else {
  $placeholder.textContent = '';
}

updatePlayState();


</script>
