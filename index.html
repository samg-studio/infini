<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>infini</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @property --iris {
      syntax: '<percentage>';
      inherits: false;
      initial-value: 150%;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      padding-bottom: 96px;
      }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at top right,
          rgba(0,0,0,.76) 0%,
          rgba(0,0,0,.46) 18%,
          rgba(0,0,0,0) 48%),
        radial-gradient(ellipse at top left,
          rgba(0,0,0,.52) 0%,
          rgba(0,0,0,.26) 22%,
          rgba(0,0,0,0) 52%),
        radial-gradient(ellipse at bottom left,
          rgba(0,0,0,.68) 0%,
          rgba(0,0,0,.36) 24%,
          rgba(0,0,0,0) 56%),
        radial-gradient(ellipse at bottom right,
          rgba(0,0,0,.68) 0%,
          rgba(0,0,0,.36) 24%,
          rgba(0,0,0,0) 56%),
        linear-gradient(to bottom,
          rgba(0,0,0,.32) 0%,
          rgba(0,0,0,0) 28%,
          rgba(0,0,0,0) 68%,
          rgba(0,0,0,.42) 100%);
      pointer-events: none;
      z-index: 520;
      }

    body.fill-mode::before {
      background:
        radial-gradient(ellipse at top right,
          rgba(0,0,0,.5) 0%,
          rgba(0,0,0,.25) 18%,
          rgba(0,0,0,0) 48%),
        radial-gradient(ellipse at top left,
          rgba(0,0,0,.34) 0%,
          rgba(0,0,0,.16) 22%,
          rgba(0,0,0,0) 52%),
        radial-gradient(ellipse at bottom left,
          rgba(0,0,0,.46) 0%,
          rgba(0,0,0,.22) 24%,
          rgba(0,0,0,0) 56%),
        radial-gradient(ellipse at bottom right,
          rgba(0,0,0,.46) 0%,
          rgba(0,0,0,.22) 24%,
          rgba(0,0,0,0) 56%),
        linear-gradient(to bottom,
          rgba(0,0,0,.22) 0%,
          rgba(0,0,0,0) 30%,
          rgba(0,0,0,0) 70%,
          rgba(0,0,0,.28) 100%);
      }

    .splash {
      position: fixed;
      inset: 0;
      appearance: none;
      border: 0;
      display: grid;
      place-items: center;
      background: #000;
      cursor: pointer;
      z-index: 2000;
      animation: splashFade 3.2s ease forwards;
    }

    .splash.is-hidden {
      display: none;
    }

    .splash-mark {
      color: #fff;
      font-size: clamp(84px, 16vw, 220px);
      font-weight: 800;
      line-height: 1;
      opacity: 0;
      animation: splashMark 2.9s ease forwards;
    }

    .splash:focus-visible {
      outline: 1px solid rgba(255,255,255,.62);
      outline-offset: -28px;
    }

    @keyframes splashFade {
      0%, 68% { opacity: 1; visibility: visible; }
      100% { opacity: 0; visibility: hidden; }
    }

    @keyframes splashMark {
      0% { opacity: 0; transform: scale(.96); }
      24%, 72% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.025); }
    }

    /* top bar */
    .top-bar {
      width: 100%;
      max-width: 1280px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 44px 48px 0;
      position: relative;
      z-index: 600;
      }

    .title-stack {
      display: flex;
      flex-direction: column;
      gap: 18px;
      }

    .brand {
      color: rgba(255,255,255,.88);
      font-size: 34px;
      font-weight: 500;
      letter-spacing: .2px;
      line-height: 1;
      }

    .top-controls {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 9px;
      }

    .reset-btn {
      margin-top: 9px;
      }

    .prompt-dock {
      position: absolute;
      top: 44px;
      left: 50%;
      width: min(48vw, 540px);
      transform: translateX(-50%);
      transition: opacity .35s ease;
      }

    .prompt-input {
      width: 100%;
      appearance: none;
      background: transparent;
      border: 0;
      border-bottom: 1px solid rgba(255,255,255,.18);
      border-radius: 0;
      color: rgba(255,255,255,.92);
      font: inherit;
      font-size: 18px;
      font-weight: 400;
      line-height: 1.35;
      outline: none;
      padding: 0 0 9px;
      transition: border-color .25s ease, color .25s ease;
    }

    .prompt-input::placeholder {
      color: rgba(255,255,255,.3);
    }

    .prompt-input:focus {
      border-color: rgba(255,255,255,.58);
      color: #fff;
    }

    .prompt-input:read-only {
      cursor: default;
      opacity: .62;
    }

    .active-prompt {
      position: fixed;
      right: 28px;
      bottom: calc(env(safe-area-inset-bottom) + 12px);
      max-width: min(58vw, 760px);
      color: rgba(255,255,255,.72);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .2px;
      line-height: 1.35;
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
      text-align: right;
      text-overflow: ellipsis;
      text-shadow: 0 2px 18px rgba(0,0,0,.68);
      transition: opacity .45s ease;
      white-space: nowrap;
      z-index: 700;
    }

    .studio-link {
      position: fixed;
      left: 28px;
      bottom: calc(env(safe-area-inset-bottom) + 12px);
      color: rgba(255,255,255,.72);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .2px;
      line-height: 1.35;
      text-decoration: none;
      text-shadow: 0 2px 18px rgba(0,0,0,.68);
      transition: opacity .25s ease;
      z-index: 700;
    }

    .studio-link:hover {
      opacity: 1;
    }

    body.is-running .prompt-dock {
      opacity: 0;
      pointer-events: none;
    }

    body.is-running .active-prompt {
      opacity: 1;
    }

    .play-btn,
    .reset-btn,
    .gallery-btn,
    .fill-btn {
      appearance: none;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: .2px;
      line-height: 1;
      opacity: .52;
      padding: 0;
      text-transform: lowercase;
      z-index: 500;
      transition: opacity .25s ease;
      }

    .play-btn:hover,
    .play-btn.is-playing,
    .reset-btn:hover,
    .gallery-btn:hover,
    .gallery-btn.is-active {
      opacity: 1;
      }

    .fill-btn {
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      opacity: .82;
    }

    .fill-icon {
      position: relative;
      display: block;
      width: 20px;
      height: 20px;
    }

    .fill-icon::before {
      content: '';
      position: absolute;
      top: 3px;
      right: 3px;
      width: 15px;
      height: 2px;
      background: currentColor;
      border-radius: 999px;
      transform: rotate(-45deg);
      transform-origin: right center;
    }

    .fill-icon::after {
      content: '';
      position: absolute;
      top: 4px;
      right: 3px;
      width: 8px;
      height: 8px;
      border-top: 2px solid currentColor;
      border-right: 2px solid currentColor;
    }

    .fill-btn.is-active,
    .fill-btn:hover {
      opacity: 1;
      }

    /* ── image area ── */
    .image-wrap {
      width: calc(100% - clamp(24px, 4vw, 64px));
      max-width: 1280px;
      aspect-ratio: 16 / 9;
      margin-top: clamp(46px, 6vh, 90px);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,.02);
      transition: opacity .7s ease;
      }

    .main-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transform: scale(1.012);
      transition: transform 24s ease-out;
      z-index: 1;
      }

    .main-img.is-visible {
      opacity: 1;
      transform: scale(1.035);
      }

    .main-img.is-entering {
      opacity: 0;
      z-index: 3;
      animation:
        fadeNextIn 6.4s ease forwards,
        kenBurnsIn 24s ease-out forwards;
      }

    .main-img.is-exiting {
      opacity: 1;
      z-index: 2;
      animation: softRelease 6.4s ease forwards;
      }

    .image-wrap.is-transitioning::after {
      content: '';
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 4;
      animation: fadeToBlack 6.4s ease-in-out forwards;
      }

    @keyframes fadeNextIn {
      0%, 48% {
        opacity: 0;
        filter: blur(2px);
      }
      72% {
        opacity: 1;
      }
      100% {
        opacity: 1;
        filter: blur(0);
      }
    }

    @keyframes kenBurnsIn {
      0% { transform: scale(1.012); }
      100% { transform: scale(1.052); }
    }

    @keyframes softRelease {
      0% {
        filter: blur(0);
        opacity: 1;
        transform: scale(1.03);
      }
      52% {
        opacity: 0;
      }
      100% {
        filter: blur(4px);
        opacity: 0;
        transform: scale(1.052);
      }
    }

    @keyframes fadeToBlack {
      0%, 8% {
        opacity: 0;
      }
      34%, 56% {
        opacity: 1;
      }
      100% {
        opacity: 0;
      }
    }

    .image-wrap .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,.1);
      font-size: 14px;
      letter-spacing: 1px;
      }

    .spinner {
      position: fixed;
      right: 28px;
      bottom: calc(env(safe-area-inset-bottom) + 36px);
      display: grid;
      place-items: center;
      opacity: 0;
      pointer-events: none;
      z-index: 710;
      transition: opacity .8s ease;
      }
    .spinner.show { opacity: 1; }

    .spinner.is-first {
      left: 50%;
      right: auto;
      top: 50%;
      bottom: auto;
      transform: translate(-50%, -50%);
    }

    .generation-mark {
      color: #fff;
      display: block;
      font-size: clamp(30px, 3.4vw, 52px);
      font-weight: 800;
      line-height: 1;
      text-shadow:
        0 0 18px rgba(255,255,255,.22),
        0 5px 24px rgba(0,0,0,.62);
      animation: generationMarkFade 2.8s ease-in-out infinite;
      }

    .spinner.is-first .generation-mark {
      font-size: clamp(84px, 16vw, 220px);
      text-shadow:
        0 0 26px rgba(255,255,255,.2),
        0 8px 34px rgba(0,0,0,.72);
    }

    @keyframes generationMarkFade {
      0%, 100% {
        opacity: .22;
        transform: scale(.98);
      }
      50% {
        opacity: .92;
        transform: scale(1.02);
      }
    }

    /* ── carousel ── */
    .carousel-track {
      position: fixed;
      left: 50%;
      bottom: clamp(32px, 7vh, 88px);
      width: min(76vw, 820px);
      height: 172px;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateX(-50%);
      z-index: 100;
      pointer-events: none;
      }

    .carousel-track.hidden {
      display: none !important;
      }

    .carousel-inner {
      position: relative;
      width: 100%;
      min-width: 0;
      height: 172px;
      overflow: visible;
      pointer-events: auto;
      }

    .carousel-viewport {
      position: absolute;
      left: 50%;
      top: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transform: translate(-50%, -50%);
      transition: transform .42s cubic-bezier(.25,.1,.25,1);
      will-change: transform;
      }

    .thumb {
      flex-shrink: 0;
      width: 34px;
      height: 34px;
      border-radius: 7px;
      overflow: hidden;
      cursor: pointer;
      opacity: .72;
      position: relative;
      transform-origin: center center;
      box-shadow: 0 10px 26px rgba(0,0,0,.42);
      transition:
        width .42s cubic-bezier(.25,.1,.25,1),
        height .42s cubic-bezier(.25,.1,.25,1),
        opacity .28s ease,
        filter .28s ease,
        transform .42s cubic-bezier(.25,.1,.25,1);
      }

    .thumb:hover {
      opacity: 1;
      transform: translateY(-4px);
      }

    .thumb.spacer {
      cursor: default;
      opacity: 0;
      pointer-events: none;
      box-shadow: none;
      }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      }

    .thumb.edge {
      width: 28px;
      height: 28px;
      opacity: .48;
      filter: saturate(.75) brightness(.85);
      }

    .thumb.far {
      width: 46px;
      height: 46px;
      opacity: .62;
      filter: saturate(.82) brightness(.9);
      }

    .thumb.mid {
      width: 72px;
      height: 72px;
      opacity: .78;
      }

    .thumb.near {
      width: 98px;
      height: 98px;
      opacity: .9;
      }

    .thumb.selected {
      width: 122px;
      height: 122px;
      opacity: 1;
      box-shadow: 0 18px 46px rgba(0,0,0,.62);
      }
    .thumb.selected::after {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: 7px;
      border: 2px solid rgba(255,255,255,.55);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.35);
      pointer-events: none;
      }

    .thumb.pop-in {
      animation: popFromRight .58s cubic-bezier(.18,.82,.24,1.08);
      }

    .thumb.selected.pop-in {
      animation-name: popSelectedFromRight;
      }

    @keyframes popFromRight {
      0% {
        opacity: 0;
        transform: translateX(74px) scale(.72);
      }
      72% {
        opacity: 1;
        transform: translateX(-8px) scale(1.06);
      }
      100% {
        transform: translateX(0) scale(1);
      }
    }

    @keyframes popSelectedFromRight {
      0% {
        opacity: 0;
        transform: translateX(96px) scale(.72);
      }
      72% {
        opacity: 1;
        transform: translateX(-10px) scale(1.04);
      }
      100% {
        transform: translateX(0) scale(1);
      }
    }

    /* ── responsive ── */
    @media (max-width: 900px) {
      .top-bar { padding: 30px 20px 0; }
      .brand { font-size: 30px; }
      .title-stack { gap: 12px; }
      .top-controls { gap: 9px; }
      .prompt-dock {
        top: 30px;
        width: min(50vw, 420px);
      }
      .prompt-input {
        font-size: 17px;
      }
      .carousel-track {
        bottom: 28px;
        width: 88vw;
        height: 132px;
      }
      .carousel-inner { height: 132px; }
      .thumb.edge { width: 18px; height: 18px; }
      .thumb.far { width: 28px; height: 28px; }
      .thumb.mid { width: 48px; height: 48px; }
      .thumb.near { width: 72px; height: 72px; }
      .thumb.selected { width: 88px; height: 88px; }
    }

    @media (max-width: 700px) {
      body {
        min-height: 100svh;
        overflow: hidden;
        padding-bottom: 0;
      }

      .top-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        max-width: none;
        padding: calc(env(safe-area-inset-top) + 18px) 18px 0;
        z-index: 600;
      }

      .title-stack { gap: 12px; }

      .brand {
        text-shadow: 0 2px 16px rgba(0,0,0,.48);
      }

      .top-controls {
        text-shadow: 0 2px 14px rgba(0,0,0,.6);
      }

      .prompt-dock {
        top: calc(env(safe-area-inset-top) + 18px);
        width: min(44vw, 240px);
      }

      .prompt-input {
        font-size: 16px;
        text-shadow: 0 2px 14px rgba(0,0,0,.68);
      }

      .active-prompt {
        right: 18px;
        max-width: 48vw;
        font-size: 12px;
      }

      .spinner {
        right: 18px;
        bottom: calc(env(safe-area-inset-bottom) + 36px);
      }

      .studio-link {
        left: 18px;
        max-width: 38vw;
        font-size: 12px;
      }

      .image-wrap {
        position: fixed;
        left: 50%;
        top: 50%;
        width: calc(100vw - 36px);
        height: auto;
        margin-top: 0;
        max-width: none;
        aspect-ratio: 16 / 9;
        border-radius: 8px;
        transform: translate(-50%, -50%);
        z-index: 0;
      }

      .main-img {
        object-fit: cover;
      }

      .carousel-track {
        bottom: calc(env(safe-area-inset-bottom) + 22px);
        width: 100vw;
        height: 124px;
        z-index: 400;
      }

      .carousel-inner {
        height: 124px;
      }
    }

    body.fill-mode .title-stack {
      opacity: 0;
      pointer-events: none;
      transition: opacity .35s ease;
    }

    body.fill-mode .image-wrap {
      --screen-pad: clamp(10px, 2.2vw, 28px);
      position: fixed;
      left: 50%;
      top: 50%;
      right: auto;
      bottom: auto;
      width: min(
        calc(100vw - (var(--screen-pad) * 2)),
        calc((100dvh - (var(--screen-pad) * 2)) * 16 / 9)
      );
      height: auto;
      max-width: none;
      margin-top: 0;
      aspect-ratio: 16 / 9;
      border-radius: 10px;
      background: #000;
      box-shadow: 0 18px 60px rgba(0,0,0,.42);
      transform: translate(-50%, -50%);
      z-index: 0;
    }

    body.fill-mode .main-img {
      object-fit: contain;
      object-position: center center;
    }

    body.fill-mode .fill-btn {
      opacity: 0;
      pointer-events: none;
    }
</style>
</head>
<body>

<button class="splash" id="splash" type="button" aria-label="Start infini">
     <span class="splash-mark">∞</span>
</button>

<!-- top bar -->
<div class="top-bar">
     <div class="title-stack">
       <div class="brand">infini</div>
       <div class="top-controls">
         <button class="play-btn" id="playBtn" type="button">start</button>
         <button class="gallery-btn is-active" id="galleryBtn" type="button">gallery</button>
         <button class="reset-btn" id="resetBtn" type="button">reset</button>
       </div>
     </div>
     <div class="prompt-dock">
       <input class="prompt-input" id="promptInput" type="text" autocomplete="off" spellcheck="false" aria-label="Prompt" />
     </div>
     <button class="fill-btn" id="fillBtn" type="button" aria-label="Enter fullscreen"><span class="fill-icon" aria-hidden="true"></span></button>
</div>

<!-- ── image area ── -->
<div class="image-wrap" id="imageWrap">
     <img class="main-img" id="mainImgA" src="" alt="" />
     <img class="main-img" id="mainImgB" src="" alt="" />
     <div class="placeholder" id="placeholder"></div>
</div>

<!-- ── carousel ── -->
<div class="carousel-track" id="carouselTrack" style="display:none">
     <div class="carousel-inner" id="carouselInner">
       <div class="carousel-viewport" id="carouselViewport"></div>
     </div>
</div>

<div class="active-prompt" id="activePrompt"></div>
<div class="spinner" id="spinner">
     <span class="generation-mark" aria-hidden="true">∞</span>
</div>
<a class="studio-link" href="https://samg.studio" target="_blank" rel="noopener noreferrer">samg.studio</a>

<script>
/* ═══════════════════════════════════════
   State & Config
   ═══════════════════════════════════════ */
const DEFAULT_PROMPT = 'Quantum Art 35mm Film';
const PREVIOUS_DEFAULT_PROMPT = 'Quantum art';
const API_STORAGE_KEY = 'infini_api_base';
const PROMPT_STORAGE_KEY = 'infini_prompt';
const PROMPT_EXAMPLES = [
  'Quantum Art 35mm Film',
  'Cinematic Kyoto rain garden, moss, lanterns, soft fog, 35mm film',
  'Brutalist desert villa at blue hour, quiet luxury architecture photo',
  'Japanese ink forest, silver river, soft wash, handmade paper texture',
  'Moroccan courtyard garden, zellige tiles, morning sun, 35mm film',
  'Amazon river at dawn, glass mist, birds, cinematic natural light',
  'Swiss alpine observatory, snow light, quiet sci-fi design, 70mm film',
  'Quantum 3D swirls, luminous topology, impossible glass, black field',
  'Graphic wonder poster, prismatic geometry, Swiss grid, museum print',
  'Oil paint storm over lavender fields, thick impasto, golden hour',
  'Seoul neon rain alley, cinematic reflections, late night 35mm still',
  'Sahara night caravan under stars, moonlit dunes, anamorphic film',
  'Coral reef cathedral, bioluminescent haze, underwater cinema',
  'Patagonia glacier lake, wind-cut clouds, nature documentary 35mm',
  'Milan furniture atelier, chrome, walnut, linen, editorial design study',
  'Istanbul rooftop at sunrise, gulls, domes, warm Kodak film grain'
];
let COMFY_HOST = getComfyHost();
let generations = [];          // { title, imgSrc, createdAt }
let isGenerating = false;
let isPlaying = false;
let isGalleryVisible = true;
let isFillMode = false;
let currentGenerationIndex = -1;
let generationRun = 0;
let activePromptId = null;
let latestPopIndex = -1;
let currentRunPrompt = DEFAULT_PROMPT;
let hasRemoteWork = false;
let audioContext = null;
let currentDemoPrompt = PROMPT_EXAMPLES[0] || DEFAULT_PROMPT;
let demoPromptIndex = 0;
let demoCharIndex = 0;
let demoDirection = 1;
let demoPromptTimer = null;

/* ── persist to localStorage ── */
function save() {
  try { localStorage.setItem('infinite_gen', JSON.stringify(generations)); } catch {}
}
function load() {
  try { generations = JSON.parse(localStorage.getItem('infinite_gen') || '[]'); } catch { generations = []; }
  generations = generations.map((gen) => ({
    title: gen.title || DEFAULT_PROMPT,
    imgSrc: normalizeImageSrc(gen.imgSrc),
    createdAt: gen.createdAt || Date.now()
  }));
}

function cleanPrompt(value) {
  return (value || '').trim() || DEFAULT_PROMPT;
}

function loadPrompt() {
  try {
    const storedPrompt = (localStorage.getItem(PROMPT_STORAGE_KEY) || '').trim();
    if (!storedPrompt || storedPrompt === PREVIOUS_DEFAULT_PROMPT || storedPrompt === DEFAULT_PROMPT) return '';
    return storedPrompt;
  } catch {
    return '';
  }
}

function savePrompt(value) {
  try {
    const prompt = (value || '').trim();
    if (prompt) {
      localStorage.setItem(PROMPT_STORAGE_KEY, prompt);
    } else {
      localStorage.removeItem(PROMPT_STORAGE_KEY);
    }
  } catch {}
}

function isPrivateHost(hostname) {
  return hostname === 'localhost' ||
    hostname === '127.0.0.1' ||
    hostname.startsWith('192.168.') ||
    hostname.startsWith('10.') ||
    /^172\.(1[6-9]|2\d|3[0-1])\./.test(hostname);
}

function cleanApiBase(value) {
  return (value || '').trim().replace(/\/+$/, '');
}

function getComfyHost() {
  const params = new URLSearchParams(location.search);
  const queryApi = cleanApiBase(params.get('api'));

  if (queryApi) {
    try { localStorage.setItem(API_STORAGE_KEY, queryApi); } catch {}
    return queryApi;
  }

  try {
    const storedApi = cleanApiBase(localStorage.getItem(API_STORAGE_KEY));
    if (storedApi) return storedApi;
  } catch {}

  if (location.protocol === 'file:') return 'http://localhost:8188';
  if (isPrivateHost(location.hostname)) return location.origin;

  return '';
}

function ensureComfyHost() {
  if (COMFY_HOST) return true;

  const value = cleanApiBase(window.prompt('ComfyUI API URL'));
  if (!value) return false;

  COMFY_HOST = value;
  try { localStorage.setItem(API_STORAGE_KEY, COMFY_HOST); } catch {}
  return true;
}

function normalizeImageSrc(src) {
  if (!src) return '';

  try {
    const url = new URL(src, location.href);
    const isComfyUrl = url.port === '8188' || url.hostname === 'localhost' || url.hostname === '127.0.0.1';

    if (COMFY_HOST && isComfyUrl && COMFY_HOST !== 'http://localhost:8188') {
      return `${COMFY_HOST}${url.pathname}${url.search}`;
    }
  } catch {}

  return src;
}

function findGeneratedImage(historyItem) {
  if (historyItem?.output?.images?.length) {
    return historyItem.output.images[0];
  }

  const outputs = historyItem?.outputs || {};
  for (const output of Object.values(outputs)) {
    if (output?.images?.length) {
      return output.images[0];
    }
  }

  return null;
}

async function interruptGeneration() {
  try {
    await fetch(`${COMFY_HOST}/interrupt`, { method: 'POST' });
  } catch {}
}

async function clearComfyQueue() {
  try {
    await fetch(`${COMFY_HOST}/queue`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ clear: true })
    });
  } catch {}
}

async function stopComfyWork() {
  await Promise.allSettled([
    interruptGeneration(),
    clearComfyQueue()
  ]);
}

async function refreshRemoteWork() {
  if (!COMFY_HOST) return;

  try {
    const res = await fetch(`${COMFY_HOST}/queue`, { cache: 'no-store' });
    if (!res.ok) return;

    const queue = await res.json();
    hasRemoteWork = Boolean(
      queue?.queue_running?.length ||
      queue?.queue_pending?.length
    );
    updatePlayState();
  } catch (err) {
    console.warn('[infini] queue check failed', err);
  }
}

  const workflow = {

        }
      },
      "57:29": {             // VAELoader
        "class_type": "VAELoader",
        "inputs": {
          "vae_name": "ae.safetensors"
        }
      },
      "57:30": {             // CLIPLoader
        "class_type": "CLIPLoader",
        "inputs": {
          "clip_name": "qwen_3_4b.safetensors",
          "type": "lumina2",
          "device": "default"
        }
      },
      "57:13": {             // EmptySD3LatentImage
        "class_type": "EmptySD3LatentImage",
        "inputs": {
          "width": 2000,
          "height": 1125,
          "batch_size": 1
        }
      },
      "58": {                // PrimitiveStringMultiline (prompt)
        "class_type": "PrimitiveStringMultiline",
        "inputs": {
          "value": prompt
        }
      },
      "57:27": {             // CLIPTextEncode (prompt)
        "class_type": "CLIPTextEncode",
        "inputs": {
          "text": ["58", 0],
          "clip": ["57:30", 0]
        }
      },
      "57:33": {             // ConditioningZeroOut (no negative)
        "class_type": "ConditioningZeroOut",
        "inputs": {
          "conditioning": ["57:27", 0]
        }
      },
      "57:3": {              // KSampler
        "class_type": "KSampler",
        "inputs": {
          "seed": Math.floor(Math.random() * 999999999),
          "steps": 4,
          "cfg": 1,
          "sampler_name": "res_multistep",
          "scheduler": "simple",
          "denoise": 1,
          "model": ["57:11", 0],
          "positive": ["57:27", 0],
          "negative": ["57:33", 0],
          "latent_image": ["57:13", 0]
        }
      },
      "57:8": {              // VAEDecode
        "class_type": "VAEDecode",
        "inputs": {
          "samples": ["57:3", 0],
          "vae": ["57:29", 0]
        }
      },
      "9": {                 // SaveImage
        "class_type": "SaveImage",
        "inputs": {
          "filename_prefix": "Infinite_",
          "images": ["57:8", 0]
        }
      }
    };

  try {
    const res = await fetch(`${COMFY_HOST}/prompt`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Infini-Client': '2'
      },
      body: JSON.stringify({ prompt: workflow })
        });

    if (!res.ok) throw new Error('Prompt failed');

    const data = await res.json();
    const promptId = data.prompt_id || data.client_id;
    activePromptId = promptId;

         /* poll /history until done */
    let attempts = 0;
    while (attempts < 120) {
      if (runId !== generationRun || !isPlaying) return;
      await new Promise(r => setTimeout(r, 1500));
      if (runId !== generationRun || !isPlaying) return;

      const hRes = await fetch(`${COMFY_HOST}/history/${promptId}`);
      const hData = await hRes.json();

      const imgInfo = findGeneratedImage(hData[promptId]);

      if (imgInfo) {
        if (runId !== generationRun || !isPlaying) return;
          /* build image URL */
        const { filename, subfolder, type } = imgInfo;
        const params = new URLSearchParams({
          filename,
          type: type || 'output'
            });
        if (subfolder) params.set('subfolder', subfolder);
        const url = `${COMFY_HOST}/view?${params}`;
        onImageReady(url);
        return;
         }
      attempts++;
       }
    throw new Error('Generation timed out');

       } catch (err) {
    if (runId !== generationRun) return;
    console.error('[comfy]', err);
    isGenerating = false;
    isPlaying = false;
    updatePlayState();
    $spinner.classList.remove('show');
       } finally {
    if (runId === generationRun) {
      activePromptId = null;
    }
       }
}

function schedulePromptDemo(delay) {
  if (demoPromptTimer) clearTimeout(demoPromptTimer);
  demoPromptTimer = setTimeout(advancePromptDemo, delay);
}

function advancePromptDemo() {
  if (!PROMPT_EXAMPLES.length) return;

  currentDemoPrompt = PROMPT_EXAMPLES[demoPromptIndex] || DEFAULT_PROMPT;
  updatePromptDemoPlaceholder();

  let delay = 48;
  if (demoDirection > 0) {
    demoCharIndex++;
    if (demoCharIndex >= currentDemoPrompt.length) {
      demoCharIndex = currentDemoPrompt.length;
      demoDirection = -1;
      delay = 1700;
    }
  } else {
    demoCharIndex--;
    delay = 24;
    if (demoCharIndex <= 0) {
      demoCharIndex = 0;
      demoDirection = 1;
      demoPromptIndex = (demoPromptIndex + 1) % PROMPT_EXAMPLES.length;
      currentDemoPrompt = PROMPT_EXAMPLES[demoPromptIndex] || DEFAULT_PROMPT;
      delay = 420;
    }
  }

  schedulePromptDemo(delay);
}

function startPromptDemo() {
  demoCharIndex = Math.max(1, demoCharIndex);

  schedulePromptDemo(70);
}

function getAudioContext() {
  const AudioCtor = window.AudioContext || window.webkitAudioContext;
  if (!AudioCtor) return null;

  if (!audioContext) audioContext = new AudioCtor();
  if (audioContext.state === 'suspended') {
    audioContext.resume().catch(() => {});
  }

  return audioContext;
}

function addTone(ctx, destination, startTime, duration, startFreq, endFreq, gainValue, panValue = 0) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const pan = ctx.createStereoPanner ? ctx.createStereoPanner() : null;

  osc.type = 'sine';
  osc.frequency.setValueAtTime(startFreq, startTime);
  osc.frequency.exponentialRampToValueAtTime(endFreq, startTime + duration);

  gain.gain.setValueAtTime(0.0001, startTime);
  gain.gain.exponentialRampToValueAtTime(gainValue, startTime + duration * .18);
  gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

  if (pan) {
    pan.pan.setValueAtTime(panValue, startTime);
    osc.connect(gain).connect(pan).connect(destination);
  } else {
    osc.connect(gain).connect(destination);
  }

  osc.start(startTime);
  osc.stop(startTime + duration + .04);
}

function addNoiseWash(ctx, destination, startTime, duration, gainValue) {
  const buffer = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * duration), ctx.sampleRate);
  const data = buffer.getChannelData(0);

  for (let i = 0; i < data.length; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  }

  const source = ctx.createBufferSource();
  const filter = ctx.createBiquadFilter();
  const gain = ctx.createGain();

  source.buffer = buffer;
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(420, startTime);
  filter.frequency.exponentialRampToValueAtTime(1800, startTime + duration * .45);
  filter.frequency.exponentialRampToValueAtTime(260, startTime + duration);

  gain.gain.setValueAtTime(0.0001, startTime);
  gain.gain.exponentialRampToValueAtTime(gainValue, startTime + duration * .22);
  gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

  source.connect(filter).connect(gain).connect(destination);
  source.start(startTime);
  source.stop(startTime + duration + .04);
}

function playWaveSound(kind = 'start') {
  const ctx = getAudioContext();
  if (!ctx) return;

  const profiles = {
    splash: { duration: 2.7, peak: .42, filter: 1400, delay: .28, feedback: .22 },
    start: { duration: 1.35, peak: .34, filter: 1900, delay: .28, feedback: .22 },
    stop: { duration: 1.45, peak: .18, filter: 1180, delay: .34, feedback: .16 },
    transition: { duration: 1.8, peak: .13, filter: 1320, delay: .42, feedback: .12 },
    reset: { duration: 1.65, peak: .24, filter: 1650, delay: .18, feedback: .1 },
    snap: { duration: .16, peak: .08, filter: 2600, delay: .08, feedback: .035 }
  };
  const profile = profiles[kind] || profiles.start;
  const now = ctx.currentTime + .025;
  const duration = profile.duration;
  const output = ctx.createGain();
  const filter = ctx.createBiquadFilter();
  const delay = ctx.createDelay();
  const feedback = ctx.createGain();

  output.gain.setValueAtTime(0.0001, now);
  output.gain.exponentialRampToValueAtTime(profile.peak, now + .12);
  output.gain.exponentialRampToValueAtTime(0.0001, now + duration + .55);

  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(profile.filter, now);
  filter.Q.setValueAtTime(.5, now);

  delay.delayTime.setValueAtTime(profile.delay, now);
  feedback.gain.setValueAtTime(profile.feedback, now);

  output.connect(filter).connect(ctx.destination);
  filter.connect(delay).connect(feedback).connect(delay);
  delay.connect(ctx.destination);

  if (kind === 'splash') {
    addTone(ctx, output, now, duration, 132, 196, .1, -.18);
    addTone(ctx, output, now + .18, duration * .92, 264, 396, .075, .18);
    addTone(ctx, output, now + .62, duration * .66, 528, 704, .045, 0);
    addNoiseWash(ctx, output, now, duration, .055);
  } else if (kind === 'stop') {
    addTone(ctx, output, now, duration, 330, 196, .052, -.1);
    addTone(ctx, output, now + .12, duration * .9, 220, 147, .042, .12);
    addNoiseWash(ctx, output, now, duration * .82, .018);
  } else if (kind === 'transition') {
    addTone(ctx, output, now, duration, 220, 294, .036, -.16);
    addTone(ctx, output, now + .22, duration * .88, 440, 392, .028, .16);
    addNoiseWash(ctx, output, now + .05, duration * .9, .015);
  } else if (kind === 'reset') {
    addTone(ctx, output, now, duration, 523, 392, .05, -.08);
    addTone(ctx, output, now + .1, duration * .84, 262, 131, .058, .08);
    addNoiseWash(ctx, output, now, duration, .028);
  } else if (kind === 'snap') {
    addTone(ctx, output, now, duration, 660, 990, .028, -.08);
    addTone(ctx, output, now + .025, duration * .78, 990, 740, .018, .08);
  } else {
    addTone(ctx, output, now, duration, 196, 330, .085, -.12);
    addTone(ctx, output, now + .08, duration * .92, 392, 660, .06, .12);
    addNoiseWash(ctx, output, now, duration * .86, .035);
  }
}

function finishSplash() {
  if (!$splash) return;

  setTimeout(() => {
    $splash.classList.add('is-hidden');
  }, 3400);
}

function hideSplash() {
  if (!$splash) return;
  $splash.classList.add('is-hidden');
}

function clearImageTransitionTimer() {
  if (imageTransitionTimer) {
    clearTimeout(imageTransitionTimer);
    imageTransitionTimer = null;
  }
}

function resetImageLayer(layer) {
  layer.onload = null;
  layer.removeAttribute('src');
  layer.className = 'main-img';
}

function loadMainImage(src, options = {}) {
  const nextSrc = normalizeImageSrc(src);
  if (!nextSrc) return;

  const currentLayer = $imageLayers[activeImageLayer];
  if (currentLayer.getAttribute('src') === nextSrc && currentLayer.classList.contains('is-visible')) {
    return;
  }

  clearImageTransitionTimer();

  const nextLayerIndex = 1 - activeImageLayer;
  const nextLayer = $imageLayers[nextLayerIndex];
  const hasCurrentImage = Boolean(currentLayer.getAttribute('src'));
  const playTransitionSound = Boolean(options.playTransitionSound);
  let didHandleLoad = false;

  nextLayer.onload = () => {
    if (didHandleLoad) return;
    didHandleLoad = true;
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        if (hasCurrentImage) {
          if (playTransitionSound) playWaveSound('transition');
          currentLayer.className = 'main-img is-exiting';
          $imageWrap.classList.add('is-transitioning');
        } else {
          currentLayer.className = 'main-img';
          $imageWrap.classList.remove('is-transitioning');
        }

        nextLayer.className = hasCurrentImage ? 'main-img is-entering' : 'main-img is-visible';
        activeImageLayer = nextLayerIndex;

        imageTransitionTimer = setTimeout(() => {
          nextLayer.className = 'main-img is-visible';
          if (hasCurrentImage) resetImageLayer(currentLayer);
          $imageWrap.classList.remove('is-transitioning');
          imageTransitionTimer = null;
        }, hasCurrentImage ? 6500 : 0);
      });
    });
  };
  nextLayer.alt = currentRunPrompt;
  nextLayer.src = nextSrc;

  if (nextLayer.complete) nextLayer.onload();
}

/* When image arrives from ComfyUI */
function onImageReady(url) {
  const imgSrc = normalizeImageSrc(url);
  generations.push({ title: currentRunPrompt, imgSrc, createdAt: Date.now() });
  latestPopIndex = generations.length - 1;
  save();
  isGenerating = false;

  selectGeneration(generations.length - 1, false, true);

  renderCarousel();
  updatePlayState();

  if (isPlaying) {
    setTimeout(startNextGeneration, 600);
  }
}

function updatePlayState() {
  const isRunning = isPlaying || isGenerating || hasRemoteWork;
  document.body.classList.toggle('is-running', isRunning);
  $playBtn.classList.toggle('is-playing', isRunning);
  $playBtn.setAttribute('aria-pressed', String(isRunning));
  $playBtn.textContent = isRunning ? 'stop' : 'start';
  $playBtn.setAttribute('aria-label', isRunning ? 'Stop generation' : 'Start generation');
  $galleryBtn.classList.toggle('is-active', isGalleryVisible);
  $galleryBtn.setAttribute('aria-pressed', String(isGalleryVisible));
  $fillBtn.classList.toggle('is-active', isFillMode);
  $fillBtn.setAttribute('aria-pressed', String(isFillMode));
  $fillBtn.setAttribute('aria-label', isFillMode ? 'Exit fullscreen' : 'Enter fullscreen');
  $promptInput.readOnly = isRunning;
  $activePrompt.textContent = isRunning ? currentRunPrompt : '';
  const showIndicator = isGenerating || hasRemoteWork;
  $spinner.classList.toggle('is-first', showIndicator && generations.length === 0);
  $spinner.classList.toggle('show', showIndicator);
  updateGalleryVisibility();
}

function updateGalleryVisibility() {
  const shouldShow = generations.length > 0 && isGalleryVisible && !isFillMode;
  $carouselTrack.classList.toggle('hidden', !shouldShow);
}

function startNextGeneration() {
  if (!isPlaying || isGenerating) return;

  isGenerating = true;
  updatePlayState();
  generate(generationRun, currentRunPrompt);
}

async function stopGeneration() {
  playWaveSound('stop');
  generationRun++;
  isPlaying = false;
  isGenerating = false;
  hasRemoteWork = false;
  activePromptId = null;
  updatePlayState();
  await stopComfyWork();
  setTimeout(refreshRemoteWork, 750);
}

function startGeneration(source = 'menu') {
  if (isPlaying || isGenerating) return;
  playWaveSound(source === 'splash' ? 'splash' : 'start');
  if (!ensureComfyHost()) return;

  generationRun++;
  currentRunPrompt = getPromptText();
  hasRemoteWork = false;
  isPlaying = true;
  hideSplash();
  updatePlayState();
  startNextGeneration();
}

function resetLibrary() {
  playWaveSound('reset');
  generationRun++;
  isPlaying = false;
  isGenerating = false;
  hasRemoteWork = false;
  isGalleryVisible = true;
  activePromptId = null;
  latestPopIndex = -1;
  currentGenerationIndex = -1;
  generations = [];

  try { localStorage.removeItem('infinite_gen'); } catch {}

  clearImageTransitionTimer();
  $imageLayers.forEach(resetImageLayer);
  activeImageLayer = 0;
  $imageWrap.classList.remove('is-transitioning');
  $placeholder.textContent = '';
  renderCarousel();
  updatePlayState();
  stopComfyWork();
}

$playBtn.addEventListener('click', () => {
  if (isPlaying || isGenerating || hasRemoteWork) {
    stopGeneration();
    return;
  }

  startGeneration('menu');
});

$splash.addEventListener('click', () => startGeneration('splash'));

$resetBtn.addEventListener('click', resetLibrary);

$promptInput.addEventListener('input', () => {
  if (!($promptInput.value || '').trim()) updatePromptDemoPlaceholder();
});
$promptInput.addEventListener('change', () => savePrompt($promptInput.value));
$promptInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    $promptInput.blur();
    if (!isPlaying && !isGenerating) $playBtn.click();
  }
});

function setGalleryVisible(isVisible) {
  isGalleryVisible = isVisible;
  updatePlayState();
}

function showLatestInFillMode() {
  if (!isFillMode || generations.length === 0) return;
  selectGeneration(generations.length - 1, false);
}

async function enterFillMode() {
  isFillMode = true;
  document.body.classList.add('fill-mode');
  showLatestInFillMode();
  updatePlayState();

  try {
    if (document.documentElement.requestFullscreen && !document.fullscreenElement) {
      await document.documentElement.requestFullscreen();
    }
  } catch {}
}

async function exitFillMode() {
  isFillMode = false;
  document.body.classList.remove('fill-mode');
  updatePlayState();

  try {
    if (document.exitFullscreen && document.fullscreenElement) {
      await document.exitFullscreen();
    }
  } catch {}
}

$galleryBtn.addEventListener('click', () => {
  setGalleryVisible(!isGalleryVisible);
});

$fillBtn.addEventListener('click', () => {
  if (isFillMode) {
    exitFillMode();
  } else {
    enterFillMode();
  }
});

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && isFillMode) {
    isFillMode = false;
    document.body.classList.remove('fill-mode');
    updatePlayState();
  }
});

   Carousel
   ═══════════════════════════════════════ */

const CAROUSEL_RADIUS = 6;

function thumbClassForDistance(distance) {
  if (distance === 0) return 'selected';
  if (distance === 1) return 'near';
  if (distance === 2) return 'mid';
  if (distance <= 4) return 'far';
  return 'edge';
}

function selectGeneration(index, shouldRender = true, fromRight = false, options = {}) {
  if (index < 0 || index >= generations.length) return;

  currentGenerationIndex = index;
  const gen = generations[index];
  loadMainImage(gen.imgSrc, { playTransitionSound: fromRight });
  if (options.playSnap) playWaveSound('snap');
  $placeholder.textContent = '';
  updatePlayState();

  if (shouldRender) renderCarousel();
}

function renderCarousel() {
     $viewport.innerHTML = '';
     $viewport.style.transform = 'translate(-50%, -50%)';

  if (generations.length === 0) {
    $carouselTrack.style.display = 'none';
    return;
  }

  if (currentGenerationIndex < 0 || currentGenerationIndex >= generations.length) {
    currentGenerationIndex = generations.length - 1;
  }

  $carouselTrack.style.display = 'flex';

  for (let offset = -CAROUSEL_RADIUS; offset <= CAROUSEL_RADIUS; offset++) {
    const i = currentGenerationIndex + offset;
    const distance = Math.abs(offset);

    if (i < 0 || i >= generations.length) {
      const spacer = document.createElement('div');
      spacer.className = `thumb ${thumbClassForDistance(distance)} spacer`;
      $viewport.appendChild(spacer);
      continue;
    }

    const gen = generations[i];
    const div = document.createElement('div');
    div.className = `thumb ${thumbClassForDistance(distance)}${i === latestPopIndex ? ' pop-in' : ''}`;
    div.setAttribute('aria-label', gen.title || `Generation ${i + 1}`);
    div.setAttribute('role', 'button');
    div.tabIndex = 0;
    div.addEventListener('animationend', () => {
      div.classList.remove('pop-in');
      if (i === latestPopIndex) latestPopIndex = -1;
    }, { once: true });

    const img = document.createElement('img');
    img.src = normalizeImageSrc(gen.imgSrc);
    img.alt = gen.title;
    img.draggable = false;
    div.appendChild(img);

       /* Click thumbnail: show it as main image */
    div.addEventListener('click', () => {
       selectGeneration(i, true, false, { playSnap: i !== currentGenerationIndex });
      });
    div.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        selectGeneration(i, true, false, { playSnap: i !== currentGenerationIndex });
      }
    });

     $viewport.appendChild(div);
     }
}

/* ═══════════════════════════════════════
   Init
   ═══════════════════════════════════════ */
$promptInput.value = loadPrompt();
currentRunPrompt = $promptInput.value || currentDemoPrompt;
startPromptDemo();
smokeTestBridge();
refreshRemoteWork();
finishSplash();
load();

if (generations.length > 0) {
     /* Show last generation */
    selectGeneration(generations.length - 1, false);
    renderCarousel();
} else {
  $placeholder.textContent = '';
}

updatePlayState();


</script>
